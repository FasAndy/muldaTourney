  if(!_tipSession)return null;
  const t=DB.tournaments.find(x=>x.id===tournamentId);
  if(!t)return null;
  // Only participants who have submitted at least one tip count as "active"
  const {data:allPicksEver}=await _sb.from('tip_picks')
    .select('participant_id,match_id').eq('tournament_id',tournamentId);
  const activeIds=new Set((allPicksEver||[]).map(p=>p.participant_id));
  const total=activeIds.size;
  if(!total)return{rank:null,total:0,pts:0};

  // Get all picks for played matches (to compute points)
  const playedIds=[...t.matches.filter(m=>m.played).map(m=>String(m.id)),
    ...(t.bracket?.matches||[]).filter(m=>m.result).map(m=>m.id)];
  const pts={};
  activeIds.forEach(id=>pts[id]=0);

  if(playedIds.length){
    const {data:allPicks}=await _sb.from('tip_picks')
      .select('participant_id,match_id,home_goals,away_goals')
      .eq('tournament_id',tournamentId)
      .in('match_id',playedIds);
    (allPicks||[]).forEach(pick=>{
      const m=t.matches.find(x=>String(x.id)===pick.match_id)||(t.bracket?.matches||[]).find(x=>x.id===pick.match_id);
      if(!m)return;
      const actualH=m.result?Math.floor(m.result.hg):m.hg;
      const actualA=m.result?Math.floor(m.result.ag):m.ag;
      if(actualH===null||actualH===undefined)return;
      const isKO_=!t.matches.find(x=>String(x.id)===pick.match_id);
      const r=calcTipPoints(pick.home_goals,pick.away_goals,actualH,actualA,t.tippingPoints,isKO_);
      pts[pick.participant_id]=(pts[pick.participant_id]||0)+r.pts;
    });
  }
  // Rank among ACTIVE participants only
  const sorted=Object.entries(pts).sort((a,b)=>b[1]-a[1]);
  const myIdx=sorted.findIndex(([id])=>id===_tipSession.participant_id);
  return{rank:myIdx+1,total:sorted.length,pts:pts[_tipSession.participant_id]||0};
}

function initTipping(){
  if(_tipSession) renderTipForm();
  else renderTipLogin();
}


// ═══════════════════════════════════════════════════════════════════════
// TIPPING RANKING ENGINE — modes A, B, C
// ═══════════════════════════════════════════════════════════════════════
function getMatchPhase(t,matchId){
  return t.matches.find(x=>String(x.id)===String(matchId))?'group':'ko';
}
function getMatchGroup(t,matchId){
  return t.matches.find(x=>String(x.id)===String(matchId))?.grp||null;
}
function computeRankings(t,participants,scoredPicks,allPicksEver){
  const mode=t.tippingMode||'A';
  const gNames=Object.keys(t.groups);
  // Init per-participant per-group points map
  const ptsByGroup={};
  participants.forEach(p=>{
    ptsByGroup[p.id]={__ko:0};
    gNames.forEach(g=>{ptsByGroup[p.id][g]=0;});
  });
  // Calculate scored points
  scoredPicks.forEach(pick=>{
    if(!ptsByGroup[pick.participant_id])return;
    const phase=getMatchPhase(t,pick.match_id);
    const m=t.matches.find(x=>String(x.id)===pick.match_id)
      ||(t.bracket?.matches||[]).find(x=>x.id===pick.match_id);
    if(!m)return;
    const aH=m.result?Math.floor(m.result.hg):m.hg;
    const aA=m.result?Math.floor(m.result.ag):m.ag;
    if(aH===null||aH===undefined)return;
    const r=calcTipPoints(pick.home_goals,pick.away_goals,aH,aA,t.tippingPoints,phase==='ko');
    if(phase==='ko'){ptsByGroup[pick.participant_id].__ko+=r.pts;}
    else if(m.grp){ptsByGroup[pick.participant_id][m.grp]=(ptsByGroup[pick.participant_id][m.grp]||0)+r.pts;}
  });
  // Global pts per mode
  function globalPts(p){
    const pg=ptsByGroup[p.id];if(!pg)return 0;
    const koPts=pg.__ko||0;
    if(mode==='A')return gNames.reduce((s,g)=>s+(pg[g]||0),0)+koPts;
    if(mode==='B'){const cg=p.chosen_group;return(cg&&pg[cg]?pg[cg]:0)+koPts;}
    return Math.max(0,...gNames.map(g=>pg[g]||0))+koPts; // C
  }
  const withPts=participants.map(p=>({
    ...p,pts:globalPts(p),ptsByGroup:ptsByGroup[p.id],
    tipsCount:(allPicksEver||[]).filter(pk=>pk.participant_id===p.id).length
  }));
  const globalRanking=[...withPts].sort((a,b)=>b.pts-a.pts);
  const byGroup={};
  gNames.forEach(g=>{
    const tipped=withPts.filter(p=>(allPicksEver||[]).some(pk=>pk.participant_id===p.id&&getMatchGroup(t,pk.match_id)===g));
    byGroup[g]=[...tipped].sort((a,b)=>(b.ptsByGroup?.[g]||0)-(a.ptsByGroup?.[g]||0));
  });
  const koTipped=withPts.filter(p=>(allPicksEver||[]).some(pk=>pk.participant_id===p.id&&getMatchPhase(t,pk.match_id)==='ko'));
  const byKO=[...koTipped].sort((a,b)=>(b.ptsByGroup?.__ko||0)-(a.ptsByGroup?.__ko||0));
  return{global:globalRanking,byGroup,byKO};
}

async function loadAdminRanking(){
  const t=T();if(!t)return;
  const el=document.getElementById('admin-ranking-content');
  if(!el)return;
  el.innerHTML='<div style="color:var(--muted);font-size:13px">Laden...</div>';
  const mode=t.tippingMode||'A';
  const gNames=Object.keys(t.groups);
  const {data:allPart,error:pErr}=await _sb.from('tip_participants')
    .select('id,name,code,chosen_group').eq('tournament_id',t.id).order('name',{ascending:true});
  if(pErr){el.innerHTML='<div style="color:var(--red)">Fehler: '+esc(pErr.message)+'</div>';return;}
  const {data:allPicksEver}=await _sb.from('tip_picks').select('participant_id,match_id').eq('tournament_id',t.id);
  const activeIds=new Set((allPicksEver||[]).map(p=>p.participant_id));
  const active=(allPart||[]).filter(p=>activeIds.has(p.id));
  const inactive=(allPart||[]).length-active.length;
  if(!active.length){
    el.innerHTML='<div style="color:var(--muted);font-size:13px">Noch keine Tipps abgegeben. ('+((allPart||[]).length)+' registrierte Codes)</div>';return;
  }
  const playedIds=[...t.matches.filter(m=>m.played).map(m=>String(m.id)),
    ...(t.bracket?.matches||[]).filter(m=>m.result).map(m=>m.id)];
  let scoredPicks=[];
  if(playedIds.length){
    const {data}=await _sb.from('tip_picks')
      .select('participant_id,match_id,home_goals,away_goals')
      .eq('tournament_id',t.id).in('match_id',playedIds);
    scoredPicks=data||[];
  }
  const {global,byGroup,byKO}=computeRankings(t,active,scoredPicks,allPicksEver);
  const mLabel={A:'Modus A — Offen',B:'Modus B — Gruppen-Loyalität',C:'Modus C — Bestes Ergebnis'}[mode];
  const rankRow=(p,i,pts)=>`<tr>
    <td><span class="rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span></td>
    <td style="font-weight:500">${esc(p.name)}${mode==='B'&&p.chosen_group?` <span style="font-size:10px;color:var(--muted)">(${esc(p.chosen_group)})</span>`:''}</td>
    <td style="text-align:right;font-weight:700;color:var(--gold)">${pts??p.pts}</td>
  </tr>`;
  let html=`<div style="font-size:11px;color:var(--muted);margin-bottom:12px;font-family:var(--font-display);font-weight:600;letter-spacing:.04em">${mLabel}</div>
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-card"><div style="font-size:20px;margin-bottom:4px">👥</div><div style="font-size:22px;font-weight:700;color:var(--gold)">${active.length}</div><div style="font-size:11px;color:var(--muted)">Aktive Teilnehmer</div></div>
    <div class="stat-card"><div style="font-size:20px;margin-bottom:4px">✅</div><div style="font-size:22px;font-weight:700;color:var(--gold)">${playedIds.length}</div><div style="font-size:11px;color:var(--muted)">Ausgewertete Spiele</div></div>
    <div class="stat-card"><div style="font-size:20px;margin-bottom:4px">🏆</div><div style="font-size:18px;font-weight:700;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${global[0]?esc(global[0].name):'—'}</div><div style="font-size:11px;color:var(--muted)">Aktuell führend</div></div>
  </div>
  ${inactive>0?`<div style="font-size:12px;color:var(--muted);margin-bottom:10px">ℹ️ ${inactive} Code(s) noch nicht verwendet.</div>`:''}
  <h3 style="margin:18px 0 8px">🌍 Globale Rangliste</h3>
  <div class="card"><table class="table">
    <thead><tr><th style="width:40px">#</th><th>Name</th><th style="text-align:right">Punkte</th></tr></thead>
    <tbody>${global.map((p,i)=>rankRow(p,i)).join('')}</tbody>
  </table></div>`;
  gNames.forEach(g=>{
    const gl=byGroup[g];if(!gl||!gl.length)return;
    html+=`<h3 style="margin:18px 0 8px">📊 ${esc(g)}</h3>
    <div class="card"><table class="table">
      <thead><tr><th style="width:40px">#</th><th>Name</th><th style="text-align:right">Punkte ${esc(g)}</th></tr></thead>
      <tbody>${gl.map((p,i)=>rankRow(p,i,p.ptsByGroup?.[g]||0)).join('')}</tbody>
    </table></div>`;
  });
  if(byKO.length){html+=`<h3 style="margin:18px 0 8px">⚡ K.O.-Phase</h3>
    <div class="card"><table class="table">
      <thead><tr><th style="width:40px">#</th><th>Name</th><th style="text-align:right">KO-Punkte</th></tr></thead>
      <tbody>${byKO.map((p,i)=>rankRow(p,i,p.ptsByGroup?.__ko||0)).join('')}</tbody>
    </table></div>`;}
  html+=`<div style="font-size:12px;color:var(--muted);margin-top:10px">Gruppe: ${t.tippingPoints?.group?.exactResult??5}/${t.tippingPoints?.group?.correctDiff??3}/${t.tippingPoints?.group?.correctTrend??2} Pkt · KO: ${t.tippingPoints?.ko?.exactResult??7}/${t.tippingPoints?.ko?.correctDiff??5}/${t.tippingPoints?.ko?.correctTrend??3} Pkt</div>`;
  el.innerHTML=html;
}

async function renderTipForm(){
  const tipDiv=document.getElementById('pt-tipping');
  if(!tipDiv||!_tipSession)return;

  const saveBtn=document.getElementById('pub-float-save');
  if(saveBtn)saveBtn.style.display='';
  const t=DB.tournaments.find(x=>x.id===_tipSession.tournament_id);
  if(!t)return;
  const myTips=await loadMyTips(t.id);
  const rankInfo=await loadMyRank(t.id);
  // Build match list: group matches + bracket matches
  const gKeys=Object.keys(t.groups);
  const grpColor=(grp)=>{
    const gi=gKeys.indexOf(grp);
    const c=GRP_COLORS[gi>=0?gi%GRP_COLORS.length:0];
    return{bg:c+'22',fg:c};
  };
  const allMatches=[
    ...t.matches.map(m=>({...m,isKO:false,label:m.grp,grpCol:grpColor(m.grp)})),
    ...(t.koPhase&&t.bracket?.matches||[])
      .filter(m=>!m.disabled&&m.awaySlot?.type!=='bye')
      .map(m=>({
        ...m,
        isKO:true,
        label:m.label,
        home:bracketSlotTeam(t,m.homeSlot)||bracketSlotLabel(m.homeSlot,t),
        away:bracketSlotTeam(t,m.awaySlot)||bracketSlotLabel(m.awaySlot,t),
        played:!!m.result,hg:m.result?Math.floor(m.result.hg):null,ag:m.result?Math.floor(m.result.ag):null,
        grpCol:{bg:'rgba(239,68,68,.15)',fg:'#ef4444'} // KO matches in red
      }))
  ];
  // Modus B: only show matches from chosen group + KO
  const modeFilter=(m)=>{
    if(t.tippingMode!=='B'||!_tipSession.chosen_group)return true;
    return m.isKO||m.grp===_tipSession.chosen_group;
  };
  const byTime=(a,b)=>{
    const ta=timeToMin(a.time), tb=timeToMin(b.time);
    if(ta===null&&tb===null)return 0;
    if(ta===null)return 1;
    if(tb===null)return -1;
    return ta-tb;

  tipDiv.innerHTML=`

        <div style="font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--gold)">👋 ${esc(_tipSession.name)}</div>
        ${t.tippingMode==='B'&&_tipSession.chosen_group?`<div style="font-size:11px;font-weight:700;font-family:var(--font-display);letter-spacing:.04em;color:var(--muted);margin-top:2px;text-transform:uppercase">${esc(_tipSession.chosen_group)} + K.O.</div>`:''}

        :`<div style="font-size:13px;color:var(--muted)">Noch keine Punkte</div>`}
      </div>
      <button class="btn btn-sm btn-ghost" onclick="tipLogout()">← Ausloggen</button>
    </div>
    ${(()=>{
      const colKey='tip_info_col_'+_tipSession.participant_id;
      const isCol=!_tipInfoExpanded[_tipSession?.participant_id]; // default: collapsed
      const gPts=t.tippingPoints?.group||t.tippingPoints||{exactResult:5,correctDiff:3,correctTrend:2};
      const kPts=t.tippingPoints?.ko||gPts;
      const hasKO=t.tippingEnabled&&t.koPhase;
      return`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden">

          ${tip?`<span style="font-size:11px;font-weight:700;color:${exact?'var(--green)':diffMatch?'#60a5fa':trend?'var(--gold)':'var(--red)'}">+${pts} Pkt</span>`:'<span style="font-size:11px;color:var(--muted)">Kein Tipp</span>'}
        </div>

          <div style="text-align:center">

          </div>
          <span style="font-size:13px;text-align:right;${isFav(m.away)?'font-weight:700':''}">${favHeart(m.away)}${esc(m.away)}</span>

    }).join('')}`:''}

// ═══════════════════════════════════════════════════════════════════════
let _resolvedTournamentId=null;
let _syncTimer=null;
let _syncInProgress=false;
let _cloudLoaded=false;

function scheduleSync(){
  if(!_cloudLoaded)return; // don't sync until initial load is done
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>{ syncActiveTournament(); }, 1500);
}

async function syncActiveTournament(){
  const t=T();
  if(!t)return;
  if(_syncInProgress)return;
  _syncInProgress=true;
  const indicator=document.getElementById('sync-indicator');
  if(indicator){indicator.textContent='💾 Speichert...';indicator.style.opacity='1';}
  try{
    const {error}=await _sb.from('tournaments_sync').upsert({
      id: t.id,
      data: t,
      updated_at: new Date().toISOString()
    },{onConflict:'id'});
    if(error){
      console.error('Sync error:',error);
      if(indicator){indicator.textContent='⚠️ Sync-Fehler';indicator.style.color='var(--red)';}
    } else {
      if(indicator){indicator.textContent='✅ Gespeichert';indicator.style.color='var(--green)';}
      setTimeout(()=>{if(indicator)indicator.style.opacity='0';},2000);
    }
  } catch(e){
    console.error('Sync exception:',e);
  }
  _syncInProgress=false;
}

async function loadTournamentFromCloud(tournamentId){
  const {data,error}=await _sb.from('tournaments_sync')
    .select('data,updated_at')
    .eq('id',tournamentId)
    .single();
  if(error||!data)return null;
  return data.data;
}

async function loadAllTournamentIdsFromCloud(){
  const {data,error}=await _sb.from('tournaments_sync').select('id,updated_at');
  if(error)return [];
  return data||[];
}

async function loadTournamentBySlugFromCloud(slug){
  // Slug lives inside the jsonb 'data' column, so we fetch all and match client-side
  // (fine at this scale — a handful of tournaments at most)
  const {data,error}=await _sb.from('tournaments_sync').select('id,data,updated_at');
  if(error||!data)return null;
  const match=data.find(row=>row.data?.slug===slug);
  return match?match.data:null;
}

function getTournamentSlugFromUrl(){
  const params=new URLSearchParams(window.location.search);
  return params.get('t');
}

async function pullLatestTournament(tournamentId){
  // For public view: always fetch fresh from cloud on load
  const cloudData=await loadTournamentFromCloud(tournamentId);
  if(cloudData){
    const idx=DB.tournaments.findIndex(x=>x.id===tournamentId);
    if(idx>=0) DB.tournaments[idx]=cloudData;
    else DB.tournaments.push(cloudData);
    return cloudData;
  }
  return null;
}

function updateQR(slug){
  const t=T();if(t)t.slug=slug||t.slug;
  const base=window.location.origin+window.location.pathname;
  const url=`${base}?t=${encodeURIComponent(slug||t?.slug||'')}`;
  const el=document.getElementById('qr-url-text');if(el)el.textContent=url;
  const c=document.getElementById('qr-container');if(c)drawQR(c,url);
}
function drawQR(container,url){
  try{
    const qr=qrcode(0,'M');
    qr.addData(url);
    qr.make();
    const cell=4, margin=4;
    const n=qr.getModuleCount();
    const sz=n*cell+margin*2;
    // SVG uses viewBox only — scales to container size via CSS width/height:100%
    let svg=`<svg viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:100%;image-rendering:pixelated">`;
    svg+=`<rect width="${sz}" height="${sz}" fill="#fff"/>`;
    for(let r=0;r<n;r++){
      for(let c=0;c<n;c++){
        if(qr.isDark(r,c)){
          svg+=`<rect x="${margin+c*cell}" y="${margin+r*cell}" width="${cell}" height="${cell}" fill="#000"/>`;
        }
      }
    }
    svg+='</svg>';
    container.innerHTML=svg;
  }catch(e){
    container.innerHTML='<div style="color:var(--red);font-size:11px;padding:10px">QR-Fehler: '+esc(e.message)+'</div>';
  }
}

function showPage(p){
  const t=T();
  // Block navigation to other pages during new tournament setup
  if(t&&t._isNew&&p!=='settings'){
    return; // silently block
  }
  document.querySelectorAll('#sb-t-nav .nav-item').forEach(n=>n.classList.remove('active'));
  const map={overview:0,settings:1,teams:2,groups:3,schedule:4,standings:5,bracket:6,custom_bracket:7,qr:8,tipping_ranking:9};
  const items=document.querySelectorAll('#sb-t-nav .nav-item');
  if(items[map[p]])items[map[p]].classList.add('active');
  // Update URL to reflect current page (enables refresh to same page)
  try{
    const slug=t?.slug;
    const params=new URLSearchParams(window.location.search);
    if(slug)params.set('t',slug);
    if(checkAdminModeParam())params.set('adminMode','');
    params.set('page',p);
    history.replaceState(null,'',window.location.pathname+'?'+params.toString());
  }catch(e){}
  renderMain(pages[p]?pages[p]():'<p style="padding:20px;color:var(--muted)">Nicht gefunden</p>');
  if(p==='qr')setTimeout(()=>{const t=T();if(t)updateQR(t.slug);},60);
  if(p==='tipping_ranking')setTimeout(()=>{const t=T();if(t&&t.tippingEnabled)loadAdminRanking();},60);
  if(p==='bracket'){setTimeout(()=>{
    const t=T();if(!t)return;
    Object.entries(t.koResults||{}).forEach(([key,res])=>{
      const inp=document.getElementById('kotime_'+key);
      if(inp&&res.time)inp.value=res.time;
    });
  },30);}
}

  // Live badge: show only when ≥1 result entered AND not archived/finished/deleted

    favBtn.style.borderColor=_favTeam?'var(--gold)':'var(--border)';
  }
  // Standings - sync widths across all groups + group colors
  {
    const allTeams=Object.values(t.groups).flat();

    const nameW=Math.min(Math.max(maxLen*7.5,80),180)+'px';
    const gNames=Object.keys(t.groups);
    document.getElementById('pt-standings').innerHTML=gNames.map((g,gi)=>{
      const col=GRP_COLORS[gi%GRP_COLORS.length];
      const ac=advanceCount(t,g);
      return '<div class="card" style="margin-bottom:10px;border-left:3px solid '+col+'">'
        +'<div style="font-size:13px;font-weight:700;margin-bottom:8px;color:'+col+'">'+esc(g)+'</div>'
        +'<table style="width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed">'
        +'<colgroup><col style="width:28px"><col style="width:'+nameW+'"><col style="width:28px"><col style="width:36px"><col style="width:50px"></colgroup>'
        +'<thead><tr>'
        +['#','Team','Sp','Pkt','Tore'].map((h,hi)=>'<th style="text-align:'+(hi<=1?'left':'right')+';font-size:10px;color:var(--muted);padding:4px 5px;border-bottom:1px solid var(--border);text-transform:uppercase">'+h+'</th>').join('')
        +'</tr></thead><tbody>'
        +calcStandings(t,g).map((r,i)=>{
          const adv=i<ac;
          const isFavRow=_favTeam&&r.t===_favTeam;
          return '<tr style="'+(isFavRow?'background:rgba(242,183,5,.07);border-left:2px solid var(--gold)':'')+'">'
            +'<td style="padding:6px 5px;border-bottom:1px solid var(--border)"><span class="rank '+(i===0?'r1':i===1?'r2':'')+'">'+(i+1)+'</span></td>'
            +'<td style="padding:6px 5px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:'+((_favTeam&&r.t===_favTeam)?'700':(adv?'600':'500'))+';color:'+(adv?'var(--accent)':'inherit')+';">'+esc(r.t)+(adv?'<span style="font-size:9px;margin-left:3px">↑</span>':'')+'</td>'
            +'<td style="padding:6px 5px;border-bottom:1px solid var(--border);text-align:right;color:var(--muted)">'+r.p+'</td>'
            +'<td style="padding:6px 5px;border-bottom:1px solid var(--border);text-align:right;font-weight:700;color:var(--accent)">'+r.pts+'</td>'
            +'<td style="padding:6px 5px;border-bottom:1px solid var(--border);text-align:right;color:var(--muted)">'+r.gf+':'+r.ga+'</td>'
            +'</tr>';
        }).join('')
        +'</tbody></table></div>';
    }).join('');
  }
  // Schedule
  renderPubSchedule(t);
  // Bracket
  renderPubBracket(t);
}

function pubSchedFilter(mode){ window._pubSchedFilter=mode; const t=T()||DB.tournaments.find(x=>!x.archived); if(t)renderPubSchedule(t); }
function pubSchedSort(mode){ window._pubSort=mode; const t=T()||DB.tournaments.find(x=>!x.archived); if(t)renderPubSchedule(t); }

function renderPubSchedule(t){
  const allM=[...t.matches];
  const byTime=(a,b)=>{const ta=timeToMin(a.time),tb=timeToMin(b.time);if(ta===null&&tb===null)return 0;if(ta===null)return 1;if(tb===null)return-1;return ta-tb;};
  const F=window._pubSchedFilter||'all';
  const SM=window._pubSort||'chrono';
  const gNames=Object.keys(t.groups);
  function grpBadge(m){
    const gi=gNames.indexOf(m.grp),col=GRP_COLORS[gi>=0?gi%GRP_COLORS.length:0];
    return `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:${col}22;color:${col}">${esc(m.grp)}</span>`;
  }
  function matchCard(m,isNext){
    const pl=m.played;
    const hasFavTeam=isFav(m.home)||isFav(m.away);
    return `<div class="match-card" style="${isNext?'border:1px solid var(--accent);background:var(--accent-dim);margin-bottom:14px':hasFavTeam?'border-left:3px solid var(--gold);background:rgba(242,183,5,.05);margin-bottom:9px':'margin-bottom:9px'}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        ${grpBadge(m)}
        <div style="display:flex;align-items:center;gap:6px">
          ${isNext?'<span style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em">▶ Nächstes</span>':''}
          ${m.time?`<span style="font-size:11px;color:var(--muted)">⏰ ${esc(m.time)}</span>`:''}
        </div>
      </div>
      <div style="display:flex;align-items:center;font-size:${isNext?15:13}px">
        <span style="flex:1;font-weight:${pl&&m.hg>m.ag?700:500};color:${pl&&m.hg>m.ag?'var(--accent)':'var(--text)'}">${favHeart(m.home)}${esc(m.home)}</span>
        <span style="font-weight:700;font-size:${isNext?17:14}px;min-width:54px;text-align:center;color:${pl?'var(--text)':'var(--subtle)'}">${pl?m.hg+' : '+m.ag:'– : –'}</span>
        <span style="flex:1;text-align:right;font-weight:${pl&&m.ag>m.hg?700:500};color:${pl&&m.ag>m.hg?'var(--accent)':'var(--text)'}">${favHeart(m.away)}${esc(m.away)}</span>
      </div>
      ${pl?'<div style="margin-top:7px;text-align:center"><span class="badge badge-green" style="font-size:10px">✅ Abgeschlossen</span></div>':''}
    </div>`;
  }
  let sorted=[...allM];
  if(SM==='chrono')sorted.sort(byTime);
  else if(SM==='group')sorted.sort((a,b)=>{const gi=gNames.indexOf,ga=gi(a.grp),gb=gi(b.grp);return ga!==gb?ga-gb:0;});
  if(F==='played')sorted=sorted.filter(m=>m.played);
  if(F==='upcoming')sorted=sorted.filter(m=>!m.played);
  const chronoAll=[...allM].sort(byTime);
  const nextMatch=F==='played'?null:chronoAll.find(m=>!m.played);
  const playedList=sorted.filter(m=>m.played);
  const upcomingList=sorted.filter(m=>!m.played);
  const showPlayed=F==='all'?playedList.slice(-3):playedList;
  const hiddenCnt=F==='all'?Math.max(0,playedList.length-3):0;
  // Build filter bar using data-filter attributes + global click
  const hasFav=!!_favTeam;
  const bars=[
    ['all','Alle',F==='all'],['upcoming','Ausstehend',F==='upcoming'],['played','Abgeschlossen',F==='played'],
    ...(hasFav?[['fav','❤️ '+(_favTeam||''),F==='fav']]:[] )
  ].map(([v,l,a])=>`<button class="btn btn-sm${a?' btn-primary':''}" data-psf="${v}">${l}</button>`).join('');
  const sortBars=[['chrono','⏰',SM==='chrono'],['group','⬡',SM==='group']]
    .map(([v,l,a])=>`<button class="btn btn-sm${a?' btn-primary':''}" data-pss="${v}" title="${v==='chrono'?'Chronologisch':'Nach Gruppe'}">${l}</button>`).join('');
  let html=`<div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap" id="pub-sched-bar">${bars}<span style="flex:1"></span>${sortBars}</div>`;
  const favFilter=(m)=>!_favTeam||(m.home===_favTeam||m.away===_favTeam);
  const upcomingShow=F==='fav'?upcomingList.filter(favFilter):upcomingList;
  const playedShow=F==='fav'?[...showPlayed].filter(favFilter):[...showPlayed];
  if(F!=='played'&&F!=='fav') upcomingList.forEach(m=>{ html+=matchCard(m,m===nextMatch&&F==='all'); });
  if(F==='fav') upcomingShow.forEach(m=>{ html+=matchCard(m,false); });
  if(F!=='upcoming'){
    if(F!=='fav'&&hiddenCnt>0) html+=`<div style="text-align:center;margin:8px 0"><button class="btn btn-sm btn-ghost" data-psf="played">+ ${hiddenCnt} weitere</button></div>`;
    (F==='fav'?playedShow.reverse():playedShow.reverse()).forEach(m=>{ html+=matchCard(m,false); });
  }
  if(!html.includes('match-card')) html+='<p style="color:var(--muted);padding:10px">Keine Spiele.</p>';
  const el=document.getElementById('pt-schedule');
  if(el){ el.innerHTML=html;
    // Event delegation for filter/sort buttons
    el.querySelectorAll('[data-psf]').forEach(b=>b.addEventListener('click',()=>pubSchedFilter(b.dataset.psf)));
    el.querySelectorAll('[data-pss]').forEach(b=>b.addEventListener('click',()=>pubSchedSort(b.dataset.pss)));
  }
}
function renderPubBracket(t){
  const fmt=t.format;
  const isDE=fmt==='group_de'||fmt==='de_only';
  if(isDE){
    const sections=[
      {label:'WB Runde 1',matches:t.deState.wbR1||[]},
      {label:'WB Halbfinale',matches:t.deState.wbSF||[]},
      {label:'LB Runde 1',matches:t.deState.lbR1||[]},
      {label:'LB Runde 2',matches:t.deState.lbR2||[]},
      {label:'LB Halbfinale',matches:t.deState.lbSF||[]},
      {label:'Grand Final',matches:t.deState.grandFinal||[]},
    ];
    const gfw=deWinner(t.deState.grandFinal?.[0]);
    document.getElementById('pt-bracket').innerHTML=sections.flatMap(s=>s.matches.map(m=>`
      <div class="match-card">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:7px">${s.label}</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:13px">
          <span class="mtn ${m.hg!==null&&m.hg>m.ag?'winner':''}">${esc(m.home)}</span>
          <span class="mres ${m.hg===null?'pending':''}">${m.hg!==null?`${m.hg} : ${m.ag}`:'– : –'}</span>
          <span class="mtn" style="text-align:right;${m.hg!==null&&m.ag>m.hg?'color:var(--accent);font-weight:600':''}">${esc(m.away)}</span>
        </div>
      </div>`)).join('')+
      (gfw?`<div style="text-align:center;padding:14px;background:var(--card);border-radius:var(--r-lg);border:1px solid var(--amber-dim);margin-top:8px">
        <div style="font-size:28px">🏆</div><div style="font-weight:700;font-size:15px;color:var(--amber);margin-top:4px">${esc(gfw)}</div>
        <div style="font-size:11px;color:var(--muted)">Turniersieger</div></div>`:'');
    return;
  }
    ensureBracket(t);
  const br=t.bracket;
  const totalR=br?Math.max(...br.matches.map(m=>m.round)):0;
  const fw=totalR&&br?bracketWinner(t,br.matches.find(m=>m.round===totalR&&!m.disabled)?.id||''):null;
  const F=window._pubKOFilter||'all';
  const q=String.fromCharCode(39);
  const filterBar='<div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap" id="pub-ko-bar">'
    +'<button class="btn btn-sm '+(F==='all'?'btn-primary':'')+'" data-pkf="all">Alle</button>'
    +'<button class="btn btn-sm '+(F==='upcoming'?'btn-primary':'')+'" data-pkf="upcoming">Ausstehend</button>'
    +'<button class="btn btn-sm '+(F==='played'?'btn-primary':'')+'" data-pkf="played">Abgeschlossen</button>'
    +(_favTeam?'<button class="btn btn-sm '+(F==='fav'?'btn-primary':'')+'" data-pkf="fav">❤️ '+esc(_favTeam)+'</button>':'')
    +'</div>';
  const byTimeKO=(a,b)=>{
    const ta=timeToMin(a.time), tb=timeToMin(b.time);
    if(ta===null&&tb===null)return (a.round-b.round)||(a.idx-b.idx);
    if(ta===null)return 1;
    if(tb===null)return -1;
    return ta-tb;
  };
  const allKOCards=(br?.matches||[]).filter(m=>!m.disabled&&m.awaySlot?.type!=='bye').sort(byTimeKO).map(m=>{
    const res=m.result;
    const pl=!!res;
    if(F==='played'&&!pl)return'';
    if(F==='upcoming'&&pl)return'';
    const homeTeam=bracketSlotTeam(t,m.homeSlot)||bracketSlotLabel(m.homeSlot,t);
    const awayTeam=bracketSlotTeam(t,m.awaySlot)||bracketSlotLabel(m.awaySlot,t);
    const homeWins=pl&&(res.tiebreak==='h'||(!res.tiebreak&&Math.floor(res.hg||0)>Math.floor(res.ag||0)));
    const awayWins=pl&&(res.tiebreak==='a'||(!res.tiebreak&&Math.floor(res.ag||0)>Math.floor(res.hg||0)));
    const winner=pl?bracketWinner(t,m.id):null;
    const hasFav=isFav(homeTeam)||isFav(awayTeam);
      return`<div class="match-card" style="${hasFav?'border-left:3px solid var(--gold);background:rgba(242,183,5,.05)':''}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <span style="font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:10px">${esc(m.label)}</span>
        ${m.time?`<span style="font-size:11px;color:var(--muted)">⏰ ${esc(m.time)}</span>`:''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 54px 1fr;align-items:center;gap:4px;font-size:13px">
        <span style="font-weight:${homeWins?'700':'500'};color:${homeWins?'var(--accent)':'var(--text)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(homeTeam)}</span>
        <span style="font-weight:700;text-align:center;color:${pl?'var(--text)':'var(--subtle)'}">${pl?Math.floor(res.hg)+' : '+Math.floor(res.ag):'– : –'}</span>
        <span style="font-weight:${awayWins?'700':'500'};color:${awayWins?'var(--accent)':'var(--text)'};text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(awayTeam)}</span>
      </div>
      ${res?.comment?`<div style="font-size:10px;color:var(--muted);font-style:italic;text-align:center;margin-top:4px">💬 ${esc(res.comment)}</div>`:''}
      ${pl?'<div style="margin-top:7px;text-align:center"><span class="badge badge-green" style="font-size:10px">✅ '+esc(winner||'—')+'</span></div>':''}
    </div>`;
  }).join('');
  const el=document.getElementById('pt-bracket');
  if(el){
    // Split into upcoming (asc) and played (desc)
    const allMatches=(br?.matches||[]).filter(m=>!m.disabled&&m.awaySlot?.type!=='bye');
    const upcoming=allMatches.filter(m=>!m.result).sort(byTimeKO);
    const played=allMatches.filter(m=>!!m.result).sort((a,b)=>byTimeKO(b,a)); // descending

    const buildCard=(m)=>{
      const res=m.result;
      const pl=!!res;
      const homeTeam=bracketSlotTeam(t,m.homeSlot)||bracketSlotLabel(m.homeSlot,t);
      const awayTeam=bracketSlotTeam(t,m.awaySlot)||bracketSlotLabel(m.awaySlot,t);
      const homeWins=pl&&(res.tiebreak==='h'||(!res.tiebreak&&Math.floor(res.hg||0)>Math.floor(res.ag||0)));
      const awayWins=pl&&(res.tiebreak==='a'||(!res.tiebreak&&Math.floor(res.ag||0)>Math.floor(res.hg||0)));
      const hasFav=isFav(homeTeam)||isFav(awayTeam);
      return`<div class="match-card" style="${hasFav?'border-left:3px solid var(--gold);background:rgba(242,183,5,.05)':''}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <span style="font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:10px">${esc(m.label)}</span>
        ${m.time?`<span style="font-size:11px;color:var(--muted)">⏰ ${esc(m.time)}</span>`:''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 54px 1fr;align-items:center;gap:4px;font-size:13px">
        <span style="font-weight:${homeWins?'700':'500'};color:${homeWins?'var(--accent)':'var(--text)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${favHeart(homeTeam)}${esc(homeTeam)}</span>
        <span style="font-weight:700;text-align:center;color:${pl?'var(--text)':'var(--subtle)'}">${pl?Math.floor(res.hg)+' : '+Math.floor(res.ag):'– : –'}${res?.tiebreak?'<br><span style="font-size:9px;color:var(--muted)">i.E.</span>':''}</span>
        <span style="font-weight:${awayWins?'700':'500'};color:${awayWins?'var(--accent)':'var(--text)'};text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${favHeart(awayTeam)}${esc(awayTeam)}</span>
      </div></div>`;
    };

    // Filter by tab
    const koFavFilter=(m)=>!_favTeam||(
      (bracketSlotTeam(t,m.homeSlot)||bracketSlotLabel(m.homeSlot,t))===_favTeam||
      (bracketSlotTeam(t,m.awaySlot)||bracketSlotLabel(m.awaySlot,t))===_favTeam
    );
    const upcomingFiltered=F==='played'?[]:F==='fav'?upcoming.filter(koFavFilter):upcoming;
    const playedFiltered=F==='upcoming'?[]:F==='fav'?played.filter(koFavFilter):played;

    el.innerHTML=filterBar
      +(fw?`<div style="text-align:center;padding:20px 14px;background:var(--card);border-radius:var(--r-lg);border:2px solid var(--amber-dim);margin-bottom:10px">
          <div style="font-size:32px;margin-bottom:6px">🏆</div>
          <div style="font-weight:700;font-size:16px;color:var(--amber);margin-bottom:2px">${esc(fw)}</div>
          <div style="font-size:11px;color:var(--muted);font-family:var(--font-display);text-transform:uppercase;letter-spacing:.08em">Turniersieger</div>
        </div>`:'')
      +upcomingFiltered.map(buildCard).join('')
      +playedFiltered.map(buildCard).join('');
    el.querySelectorAll('[data-pkf]').forEach(b=>b.addEventListener('click',()=>{window._pubKOFilter=b.dataset.pkf;renderPubBracket(t);}));
  }
}

async function refreshPublicView(){
  // Find refresh button (last button in float bar)
  const btn=document.querySelector('#pub-float-bar button:last-of-type');
  if(btn){btn.innerHTML='⏳';btn.disabled=true;}
  try{
    // Pull fresh tournament from cloud
    const t=T()||DB.tournaments.find(x=>!x.archived)||DB.tournaments[0];
    if(t){
      const fresh=await pullLatestTournament(t.id);
      if(fresh) DB.activeTournamentId=fresh.id;
    }
    // Re-render active tab without triggering full initTipping() reset
    const activeTab=document.querySelector('.pub-tab.active');
    const activeId=activeTab?.dataset?.target||'pt-standings';
    if(activeId==='pt-tipping'){
      // For tipping tab: just re-render tip form if logged in, else render login
      if(_tipSession) await renderTipForm();
      else renderTipLogin();
    } else if(activeId==='pt-standings'){
      renderPublic();
    } else if(activeId==='pt-schedule'){
      renderPubSchedule(T());
    } else if(activeId==='pt-bracket'){
      renderPubBracket(T());
    } else {
      // Fallback: re-render entire public view
      await renderPublic();
    }
  }finally{
    if(btn){btn.innerHTML='🔄 Aktualisieren';btn.disabled=false;}
  }
}

async function saveAllTips(){
  if(!_tipSession)return;
  const t=DB.tournaments.find(x=>x.id===_tipSession.tournament_id);
  if(!t)return;
  const btn=document.getElementById('pub-float-save');
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  // Gather all filled inputs
  const inputs=document.querySelectorAll('#pt-tipping input[id^="tip_h_"]');
  let saved=0,skipped=0,locked=0;
  // Get fresh tournament to check locked matches
  const fresh=await pullLatestTournament(_tipSession.tournament_id);
  const freshT=fresh||t;
  for(const hInp of inputs){
    const matchId=hInp.id.replace('tip_h_','');
    const aInp=document.getElementById('tip_a_'+matchId);
    if(!hInp.value.trim()||!aInp?.value.trim())continue;
    const h=parseInt(hInp.value),a=parseInt(aInp.value);
    if(isNaN(h)||isNaN(a))continue;
    // Check if locked
    const m=freshT.matches.find(x=>String(x.id)===matchId)||(freshT.bracket?.matches||[]).find(x=>x.id===matchId);
    if(m?.played||m?.result){locked++;continue;}
    const {error}=await _sb.from('tip_picks').upsert({
      participant_id:_tipSession.participant_id,
      tournament_id:_tipSession.tournament_id,
      match_id:String(matchId),home_goals:h,away_goals:a
    },{onConflict:'participant_id,match_id'});
    if(!error)saved++;else skipped++;
  }
  if(btn){btn.textContent='💾 Tipps speichern';btn.disabled=false;}
  const msg=saved>0?`✅ ${saved} Tipp${saved>1?'s':''} gespeichert`:'Keine neuen Tipps zum Speichern.';
  const note=locked>0?` (${locked} Spiel${locked>1?'e':''} bereits gesperrt)`:''
  // Show brief toast
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:10px 18px;font-size:13px;color:var(--text);z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.4);white-space:nowrap;font-family:var(--font-display);font-weight:600';
  toast.textContent=msg+note;
  document.body.appendChild(toast);
  setTimeout(()=>{toast.remove();renderTipForm();},2000);
}

  md.innerHTML=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;width:100%;max-width:360px">
    <h3 style="margin-bottom:6px">⚖️ Unentschieden ${hg}:${ag}</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Im K.O. muss ein Sieger bestimmt werden. Wähle das weiterkommende Team:</p>

      <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--r);cursor:pointer;border:2px solid transparent;transition:border-color .15s" id="draw-opt-h">

        <span style="font-size:11px;color:var(--muted)">Heimteam</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--r);cursor:pointer;border:2px solid transparent;transition:border-color .15s" id="draw-opt-a">
        <input type="checkbox" id="draw-cb-a" style="width:auto;flex-shrink:0;cursor:pointer" onchange="selectDrawWinner('a')">
        <span style="font-weight:500;flex:1">${esc(awayName)}</span>
        <span style="font-size:11px;color:var(--muted)">Auswärtsteam</span>
      </label>
    </div>
    <div class="form-group">

      <button class="btn" onclick="document.getElementById('draw-modal').remove()">Abbrechen</button>
      <button class="btn btn-primary" id="draw-confirm-btn" disabled onclick="confirmDrawWinner('${key}',${hg},${ag})">✓ Bestätigen</button>
    </div>
  </div>`;
  document.body.appendChild(md);
  window._drawSide=null;
}

function selectDrawWinner(side){
  const cbH=document.getElementById('draw-cb-h');
  const cbA=document.getElementById('draw-cb-a');
  const optH=document.getElementById('draw-opt-h');
  const optA=document.getElementById('draw-opt-a');
  const btn=document.getElementById('draw-confirm-btn');
  // Mutually exclusive: checking one unchecks other
  if(side==='h'){
    if(cbA)cbA.checked=false;
    if(optH)optH.style.border='2px solid var(--accent)';
    if(optA)optA.style.border='2px solid transparent';
    window._drawSide='h';
  } else {
    if(cbH)cbH.checked=false;
    if(optA)optA.style.border='2px solid var(--accent)';
    if(optH)optH.style.border='2px solid transparent';
    window._drawSide='a';
  }
  if(btn)btn.disabled=false;
}

function confirmDrawWinner(key,hg,ag){
  const t=T();if(!t)return;
  const side=window._drawSide;
  if(!side){alert('Bitte Sieger wählen!');return;}
  const comment=document.getElementById('draw-comment')?.value.trim()||'';
  const result={hg:hg+(side==='h'?0.1:0),ag:ag+(side==='a'?0.1:0),comment,tiebreak:side};
  // Update new bracket system
  const bm=t.bracket?.matches?.find(x=>x.id===key);
  if(bm){bm.result=result;}
  else{t.koResults[key]=result;}
  document.getElementById('draw-modal')?.remove();
  showPage('bracket');
}

function closeKOModal(){document.getElementById('ko-edit-modal')?.remove();}

function editKOTeamsOpen(key, focusSlot) {
  const t = T(); if (!t) return;
  // Resolve current display names
  ensureBracket(t);
  const bm = t.bracket?.matches?.find(x => x.id === key);
  const curH = bracketSlotTeam(t, bm?.homeSlot) || bracketSlotLabel(bm?.homeSlot, t) || '';
  const curA = bracketSlotTeam(t, bm?.awaySlot) || bracketSlotLabel(bm?.awaySlot, t) || '';
  editKOTeams(key, curH, curA);

  }, 50);
}

function editKOTeams(key,curH,curA){
  const t=T();if(!t)return;
  const gNames=Object.keys(t.groups);
  const qualOpts=[];
  // Qualifier options: "1. Gruppe A", "2. Gruppe B", ... ordered by rank then group
  const maxAC=Math.max(...gNames.map(g=>advanceCount(t,g)),2);
  for(let rank=0;rank<maxAC;rank++){
    gNames.forEach(g=>{
      if(rank<advanceCount(t,g))
        qualOpts.push((rank+1)+'. '+g);
    });
  }
  // qualOpts first, then team names
  const optsHome=['— Auto —',...qualOpts,...t.teams].map(o=>'<option value="'+esc(o)+'">'+esc(o)+'</option>').join('');
  const optsAway=['— Auto —','BYE / Freilos',...qualOpts,...t.teams].map(o=>'<option value="'+esc(o)+'">'+esc(o)+'</option>').join('');
  const m=document.createElement('div');
  m.id='ko-edit-modal';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';
  m.innerHTML='<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;width:100%;max-width:360px">'
    +'<h3 style="margin-bottom:14px">✏️ Teams bearbeiten</h3>'
    +'<div class="form-group"><label class="form-label">Heimteam</label><select id="ko-eh">'+optsHome+'</select></div>'
    +'<div class="form-group"><label class="form-label">Auswärtsteam</label><select id="ko-ea">'+optsAway+'</select></div>'
    +'<div class="form-group"><label class="form-label">Kürzel bearbeiten</label><input id="ko-el" placeholder="z.B. VF1, HF2, Kleine Finale..."></div>'
    +'<div class="form-group"><label class="form-label">Uhrzeit</label><input type="time" id="ko-et"></div>'
    +'<div class="form-group"><label class="form-label">Kommentar (z.B. nach Verlängerung)</label><input id="ko-ec" placeholder="optional..."></div>'
    +'<div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">'
    +'<button class="btn" onclick="closeKOModal()">Abbrechen</button>'
    +'<button class="btn btn-primary" onclick="saveKOTeams(window._koEditKey)">Speichern</button>'
    +'</div></div>';
  window._koEditKey=key;
  document.body.appendChild(m);
  setTimeout(()=>{
    ensureBracket(t);
    const bm=t.bracket?.matches?.find(x=>x.id===key);
    const hs=document.getElementById('ko-eh'),as=document.getElementById('ko-ea');
    const cs=document.getElementById('ko-ec'),ts=document.getElementById('ko-et');
    const hName=bm?.homeSlot?.type==='team'?bm.homeSlot.value:curH;
    const aName=bm?.awaySlot?.type==='team'?bm.awaySlot.value:curA;
    if(hs&&hName)for(let o of hs.options)if(o.value===hName){o.selected=true;break;}
    if(as&&aName)for(let o of as.options)if(o.value===aName){o.selected=true;break;}
    if(cs&&bm?.result?.comment)cs.value=bm.result.comment;
    if(ts&&bm?.time)ts.value=bm.time;
    const koElR=document.getElementById('ko-el');
    if(koElR&&bm?.label)koElR.value=bm.label;
  },20);
}
function saveKOTeams(key){
  const t=T();if(!t)return;
  const h=document.getElementById('ko-eh')?.value||'';
  const a=document.getElementById('ko-ea')?.value||'';
  const c=document.getElementById('ko-ec')?.value||'';
  const timeVal=document.getElementById('ko-et')?.value||'';
  // Update new bracket system
  ensureBracket(t);
  const bm=t.bracket?.matches?.find(x=>x.id===key);
  // Original placeholder labels (round 1: seed labels like "1. Gruppe A"; later rounds: winner-of-previous-match)
  function resetSlotFor(slotKind /* 'home'|'away' */){
    if(bm.round===1){
      // Recompute the original seed for this R1 slot from the bracket's seeding
      const seeds=koSeeds(t);
      const idx=bm.idx;
      const seed=slotKind==='home'?seeds[idx*2]:seeds[idx*2+1];
      return seed?{type:'seed',value:seed.label}:{type:'bye'};
    }
    // Later rounds: find the edge that originally fed this slot (winner of previous match)
    const ed=t.bracket.edges.find(e=>e.toId===bm.id&&e.toSlot===slotKind);
    if(ed) return{type:ed.type,sourceId:ed.fromId};
    return{type:'seed',value:'—'};
  }
  function makeSlot(val,slotKind){
    if(!val)return null; // empty = leave untouched
    if(val==='— Auto —')return resetSlotFor(slotKind); // explicit reset to placeholder
    if(val==='BYE / Freilos')return{type:'bye'};
    const isLabel=/^\d+\.\s/.test(val)||/^Gruppen(sieger|zweiter|dritter|vieter|fünfter)/.test(val);
    return{type:isLabel?'seed':'team',value:val};
  }
  if(bm){
    const hs=makeSlot(h,'home'),as=makeSlot(a,'away');
    if(hs!==null)bm.homeSlot=hs;
    if(as!==null)bm.awaySlot=as;
    if(c){if(!bm.result)bm.result={hg:null,ag:null};bm.result.comment=c;}
    if(timeVal)bm.time=timeVal;
    const koElVal=document.getElementById('ko-el')?.value?.trim();
    if(koElVal)bm.label=koElVal;
  }
  closeKOModal();
  showPage('bracket');
}
function editKOComment(matchId){
  const t=T();if(!t)return;
  // Try new bracket system first
  const bm=t.bracket?.matches?.find(x=>x.id===matchId);
  const cur=bm?.result?.comment||(t.koResults[matchId]||{}).comment||'';
  const c=prompt('Kommentar (z.B. "3:1 n.E.", "nach Verlängerung"):',cur);
  if(c!==null){
    if(bm&&bm.result){bm.result.comment=c.trim();}
    else{if(!t.koResults[matchId])t.koResults[matchId]={hg:null,ag:null};t.koResults[matchId].comment=c.trim();}
    showPage('bracket');
  }
}

function finishGroupPhase(){
  const t=T();if(!t)return;
  const unplayed=t.matches.filter(m=>!m.played).length;
  let msg='Gruppenphase abschließen?\n\n';
  if(unplayed>0)msg+=`⚠️ Es sind noch ${unplayed} Spiele offen!\n`;
  msg+='\nDie qualifizierten Teams werden automatisch in den K.O.-Bracket eingetragen.';
  if(!confirm(msg))return;
  t.koPhase=true;
  t.phase='K.O.-Runde';
  t.koOverrides={};
  // Preserve existing bracket if already configured - only reset results
  if(t.bracket && t.bracket.matches.length > 0){
    // Keep bracket structure, only clear results
    t.bracket.matches.forEach(m=>{m.result=null;});
    t.koResults={};
  } else {
    // No bracket yet - will be auto-generated from seeds on first view
    t.bracket=null;
    t.koResults={};
  }
  showPage('overview');
}
function reopenGroupPhase(){
  const t=T();if(!t)return;
  if(!confirm('Gruppenphase wieder öffnen? K.O.-Ergebnisse bleiben erhalten.'))return;
  t.koPhase=false;t.phase='Gruppenphase';
  showPage('overview');
}

async function initApp(){
  // Tournament resolution priority:
  // 1) ?t=<slug> in URL — explicit tournament selection (what public links/QR codes use)
  // 2) Most recently synced tournament — admin convenience on reload
  try{
    const urlSlug=getTournamentSlugFromUrl();
    let resolved=null;
    if(urlSlug){
      resolved=await loadTournamentBySlugFromCloud(urlSlug);
    }
    if(!resolved){
      const ids=await loadAllTournamentIdsFromCloud();
      if(ids.length){
        const latestId=ids.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at))[0].id;
        resolved=await loadTournamentFromCloud(latestId);
      }
    }
    if(resolved){
      const idx=DB.tournaments.findIndex(x=>x.id===resolved.id);
      if(idx>=0) DB.tournaments[idx]=resolved; else DB.tournaments.unshift(resolved);
    }
    _resolvedTournamentId = resolved?.id || null;
    // If cloud was successfully contacted but returned no tournament,
    // clear demo data so we don't show stale/fake tournaments
    if(!resolved) DB.tournaments=[];
  }catch(e){ console.warn('Cloud restore failed, keeping local demo data:',e); _resolvedTournamentId=null; }
  _cloudLoaded=true;
  openHome(); // fav loaded per-tournament on tip login
  // openHome() resets activeTournamentId to null — re-apply our resolved tournament.
  if(_resolvedTournamentId) DB.activeTournamentId=_resolvedTournamentId;

  // Determine which page to restore from URL
  const _urlParams=new URLSearchParams(window.location.search);
  const _urlPage=_urlParams.get('page');

  // Admin access: only reachable via ?adminMode URL param + password
  if(checkAdminModeParam()){
    if(isAdminUnlocked()){
      setView('admin');
      // Only restore last page if a tournament is still active
      if(_urlPage&&pages[_urlPage]&&_resolvedTournamentId) showPage(_urlPage);
    } else {
      showAdminPasswordPrompt();
    }
  } else {
    setView('public');
  }

  checkTipUrlParam();
}
initApp();
