<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WAMPN v0.47</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* FC Muldakicker — Club Colours (dark mode) */
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
:root{
  /* Club palette */
  --navy:#06294F;
  --club-blue:#0A4078;
  --club-blue-light:#1A5A9E;
  --gold:#F2B705;
  --gold-dark:#C99200;
  --gold-dim:rgba(242,183,5,.15);
  --off-white:#F5F6F8;
  /* Dark-mode surface stack */
  --bg:#041e36;
  --bg2:#06294F;
  --bg3:#0A4078;
  --card:#071e38;
  /* Borders */
  --border:rgba(255,255,255,0.11);
  --border2:rgba(242,183,5,0.28);
  /* Text */
  --text:#F5F6F8;
  --muted:rgba(245,246,248,0.55);
  --subtle:rgba(245,246,248,0.28);
  /* Accent = Gold */
  --accent:#F2B705;
  --accent-dim:rgba(242,183,5,.15);
  /* Status */
  --green:#22c55e;--green-dim:#14532d;--green-bg:rgba(34,197,94,.12);
  --amber:#F2B705;--amber-dim:#78350f;--amber-bg:rgba(242,183,5,.12);
  --red:#ef4444;--red-dim:#7f1d1d;--red-bg:rgba(239,68,68,.12);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.12);
  --r:6px;--r-lg:10px;
  /* Typography */
  --font-display:'Barlow Condensed',system-ui,sans-serif;
  --font-body:'Inter',-apple-system,sans-serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
h1{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
h2{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
h3{font-family:var(--font-display);font-size:14px;font-weight:600;letter-spacing:.03em}
/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;min-width:230px;background:linear-gradient(180deg,var(--navy) 0%,var(--club-blue) 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:24px;background:var(--bg);background-image:radial-gradient(ellipse at 80% 0%,rgba(242,183,5,.03) 0%,transparent 60%)}
/* SIDEBAR */
.sb-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.2)}
.sb-logo{width:34px;height:34px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.sb-logo img{width:100%;height:100%;object-fit:cover}
.sb-sec{padding:10px 12px 3px;font-size:9px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;opacity:.7}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 12px;margin:1px 8px;border-radius:var(--r);cursor:pointer;font-size:12px;font-family:var(--font-display);font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(245,246,248,0.65);border:none;border-left:3px solid transparent;background:none;width:calc(100% - 16px);text-align:left;transition:all .12s}
.nav-item:hover{background:rgba(242,183,5,.08);color:var(--off-white)}
.nav-item.active{background:var(--gold-dim);color:var(--gold);font-weight:600;border-left:3px solid var(--gold)}
.nav-item .ic{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.live-b{display:inline-flex;align-items:center;gap:4px;background:var(--gold-dim);color:var(--gold);font-size:10px;font-weight:700;font-family:var(--font-display);letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-left:auto}
.ld{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sb-footer{padding:12px;border-top:1px solid var(--border);margin-top:auto}
/* T-LIST */
.tli{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 8px;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--muted);border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:inherit;transition:all .12s}
.tli:hover{background:var(--bg3);color:var(--text)}
.tli.active{background:var(--accent-dim);color:var(--accent)}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font-display);letter-spacing:.03em;color:var(--text);transition:all .12s;white-space:nowrap}
.btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700}
.btn-primary:hover:not(:disabled){background:var(--gold-dark);color:var(--navy)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-danger{color:var(--red);border-color:var(--red-dim);background:var(--red-bg)}
.btn-danger:hover:not(:disabled){border-color:var(--red)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--border)}
.btn-success{background:var(--green-bg);color:var(--green);border-color:var(--green-dim)}
.btn-success:hover:not(:disabled){background:rgba(34,197,94,.2);border-color:var(--green)}
/* FORMS */
input,select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:rgba(0,0,0,0.2);color:var(--text);outline:none;font-family:var(--font-body);transition:border-color .12s}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-dim)}
input[type=number]{-moz-appearance:auto}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:auto;opacity:1}
select option{background:var(--bg3);color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-blue{background:var(--gold-dim);color:var(--gold)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-muted{background:var(--bg3);color:var(--muted)}
/* TABLE */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;font-size:10px;font-weight:700;font-family:var(--font-display);color:var(--gold);padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.08em;opacity:.8}
.table td{padding:7px 8px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tbody tr:hover td{background:var(--bg3)}
/* Standings table: fixed stat columns, team name fills rest */
.standings-table{table-layout:fixed;width:100%;max-width:600px}
.standings-table .col-rank{width:28px}
.standings-table .col-name{} /* auto fills remaining */
.standings-table .col-stat{width:38px;text-align:right}
.standings-table .col-goals{width:58px;text-align:right}
.standings-table th.col-stat,.standings-table td.col-stat,
.standings-table th.col-goals,.standings-table td.col-goals{text-align:right}
.standings-table td.col-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0}
.rank{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;font-size:11px;font-weight:700;background:var(--bg3);color:var(--muted)}
.rank.r1{background:rgba(234,179,8,.2);color:#eab308}
.rank.r2{background:rgba(148,163,184,.15);color:#94a3b8}
.rank.r3{background:rgba(180,83,9,.2);color:#b45309}
/* ALERTS */
.alert{padding:9px 13px;border-radius:var(--r);font-size:13px;display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;line-height:1.5}
.alert-blue{background:var(--accent-dim);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.alert-green{background:var(--green-bg);color:#86efac;border:1px solid rgba(34,197,94,.3)}
.alert-amber{background:var(--amber-bg);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
/* TEAMS */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;margin-top:8px}
.team-chip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:space-between;gap:4px}
.team-chip button{cursor:pointer;color:var(--muted);font-size:15px;line-height:1;background:none;border:none;padding:0 2px}
.team-chip button:hover{color:var(--red)}
/* GROUPS */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.grp-card{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--card)}
.grp-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);font-weight:600;font-size:13px}
/* SCORE */
.score-inp{width:44px;padding:3px 4px;text-align:center;font-size:13px;border:1px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--text)}
.score-inp:focus{border-color:var(--accent);outline:none}
/* Schedule table alignment */
.sched-table{table-layout:auto;width:100%}
.sched-table .col-drag{width:20px}
.sched-table .col-time{width:82px}
.sched-table .col-grp{width:72px}
.sched-table .col-team{min-width:80px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sched-table .col-result{width:110px;text-align:center}
.sched-table th.col-result{text-align:center}
.sched-table td.col-result{text-align:center}
.sched-table .col-status{width:70px}
.sched-table .col-action{width:36px}
.save-btn{opacity:.35;pointer-events:none}
.save-btn.ready{opacity:1;pointer-events:auto}
/* SCHEDULE */
.sched-row{cursor:grab;transition:background .1s}
.sched-row:active{cursor:grabbing}
.sched-row.dragging{opacity:.35}
.sched-row.drag-over td{border-top:2px solid var(--gold)}
.drag-handle{color:var(--subtle);padding:0 4px;font-size:13px;user-select:none;cursor:grab}
/* BRACKET */
.bracket-wrap{overflow-x:auto;padding-bottom:8px}
.bracket{display:flex;align-items:stretch;min-width:fit-content}
.round-col{display:flex;flex-direction:column;min-width:170px}
.round-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:center;padding:4px 0 8px;letter-spacing:.07em}
.matches-col{display:flex;flex-direction:column;flex:1;justify-content:space-around}
.match-slot{margin:4px 6px}
.match-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.mt{display:flex;align-items:center;padding:5px 8px;gap:5px;min-height:30px}
.mt.winner{background:var(--gold-dim);border-left:3px solid var(--gold);color:var(--gold);font-weight:700}
.mt.loser{color:var(--subtle);background:rgba(0,0,0,.15)}
.mt.pending{color:var(--muted)}
.mscore{font-weight:700;min-width:15px;text-align:right;font-size:12px}
.mdiv{height:1px;background:var(--border)}
.conn-col{display:flex;flex-direction:column;justify-content:space-around;width:16px;flex-shrink:0}
.conn-line{width:100%;height:1px;background:var(--border2)}
/* ELIM */
.elim-sec{background:var(--bg3);border-radius:var(--r);padding:12px;border:1px solid var(--border);margin-bottom:10px}
/* QR */
.qr-box{background:#fff;padding:8px;border-radius:8px;width:180px;height:180px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-sizing:border-box}
/* VIEW TOGGLE */
.view-toggle{position:fixed;top:10px;right:14px;z-index:200;display:flex;gap:5px}
.vbtn{padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:700;font-family:var(--font-display);letter-spacing:.04em;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:all .12s}
.vbtn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;text-align:center}
/* HOME */
.t-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s;margin-bottom:10px}
.t-card:hover{border-color:var(--accent)}
.t-card-logo{width:42px;height:42px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.t-card-logo img{width:100%;height:100%;object-fit:cover}
/* PUBLIC */
#public-view{display:none;min-height:100vh;background:var(--bg)}
.pub-header{background:var(--navy);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.pub-logo{width:32px;height:32px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.pub-logo img{width:100%;height:100%;object-fit:cover}
.pub-live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;background:var(--green-bg);color:var(--green);padding:3px 9px;border-radius:20px;margin-left:auto;border:1px solid rgba(34,197,94,.3)}
.pub-content{padding:12px;max-width:600px;margin:0 auto}
.pub-tabs{display:flex;background:var(--bg3);padding:3px;border-radius:var(--r);margin-bottom:12px}
.pub-tab{flex:1;padding:7px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--muted);text-align:center;border:none;background:none;font-family:inherit;font-weight:500;transition:all .12s}
.pub-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:11px;margin-bottom:9px}
.mtn{flex:1;font-weight:500}
.mtn.winner{color:var(--accent);font-weight:600}
.mres{font-size:15px;font-weight:700;min-width:46px;text-align:center}
.mres.pending{font-size:12px;color:var(--subtle)}
/* TIEBREAKER DND */
.tb-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.tb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:grab;user-select:none;font-size:13px}
.tb-item:active{cursor:grabbing}
.tb-item.dragging{opacity:.35}
.tb-item.drag-over{border-top:2px solid var(--accent)}
.tb-rank-num{width:20px;height:20px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* ADVANCE PER GROUP */
.adv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:8px}
.adv-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);gap:10px}
.adv-item label{font-size:12px;color:var(--muted);flex:1}
.adv-item input{width:50px;text-align:center;flex-shrink:0}
/* CUSTOM BRACKET */
.cb-slot{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 7px;margin:3px 5px;font-size:11px}
.cb-slot select{font-size:11px;padding:2px 4px;border:none;background:transparent;color:var(--text);width:100%}
/* SCROLLBAR */
/* ── BRACKET CUSTOMIZE ── */
.bracket-customize-mode .bracket-header{cursor:grab;user-select:none;transition:background .12s}
.bracket-customize-mode .bracket-header:hover{background:rgba(59,130,246,.1)}
.bracket-slot{padding:6px 9px;min-height:30px;display:flex;align-items:center;gap:5px;border:1px solid transparent;font-size:11px}
.bracket-slot-home{border-bottom:1px solid var(--border)}
.bracket-slot.winner{background:var(--gold-dim);font-weight:700;color:var(--gold)}
.bracket-slot.loser{background:rgba(0,0,0,.15);color:var(--subtle)}
.bracket-slot-droppable:hover{background:rgba(59,130,246,.1)!important;cursor:pointer}
.bracket-match-disabled{opacity:.35;filter:grayscale(.7)}
.bracket-score-row{display:flex;align-items:center;justify-content:center;padding:5px;background:rgba(0,0,0,.08);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.bracket-score-big{font-weight:700;font-size:15px;letter-spacing:2px}
.bracket-drag-over .bracket-slot{background:var(--accent-dim)!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}}
</style>
</head>

  <button class="vbtn active" id="vbtn-admin" onclick="setView('admin')" style="display:none">⚙ Admin</button>

</div>

<div id="admin-view" class="app" style="display:none">
  <div class="sidebar">

      <button class="nav-item" onclick="showPage('settings')"><span class="ic">⚙️</span>Einstellungen</button>
      <button class="nav-item" onclick="showPage('teams')"><span class="ic">👥</span>Teams</button>

      <div style="padding:8px 16px;margin-top:4px">
        <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center" onclick="openHome()">← Turnierliste</button>
      </div>
    </div>
    <div style="flex:1"></div>
    <div class="sb-footer">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px" id="sb-footer-lbl">TourneyPro

// ═══════════════════════════════════════════════════════════════════════
// STANDINGS CALC

function calcStandings(t,gName){
  const teams=t.groups[gName]||[];
  const rows={};
  teams.forEach(tm=>rows[tm]={t:tm,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,h2hMap:{}});
  t.matches.filter(m=>m.grp===gName&&m.played).forEach(m=>{
    const h=rows[m.home],a=rows[m.away];if(!h||!a)return;
    h.p++;a.p++;h.gf+=m.hg;h.ga+=m.ag;a.gf+=m.ag;a.ga+=m.hg;
    if(m.hg>m.ag){h.w++;h.pts+=t.ptsWin;a.l++;a.pts+=t.ptsLoss;}
    else if(m.hg<m.ag){a.w++;a.pts+=t.ptsWin;h.l++;h.pts+=t.ptsLoss;}
    else{h.d++;a.d++;h.pts+=t.ptsDraw;a.pts+=t.ptsDraw;}
    if(!h.h2hMap[m.away])h.h2hMap[m.away]={pts:0,gd:0};
    if(!a.h2hMap[m.home])a.h2hMap[m.home]={pts:0,gd:0};
    const hpts=m.hg>m.ag?t.ptsWin:m.hg<m.ag?t.ptsLoss:t.ptsDraw;
    const apts=m.ag>m.hg?t.ptsWin:m.ag<m.hg?t.ptsLoss:t.ptsDraw;
    h.h2hMap[m.away].pts+=hpts;h.h2hMap[m.away].gd+=(m.hg-m.ag);
    a.h2hMap[m.home].pts+=apts;a.h2hMap[m.home].gd+=(m.ag-m.hg);
  });
  const tbs=t.tiebreakers||['pts','td','gf','h2h'];
  return Object.values(rows).sort((a,b)=>{
    for(const tb of tbs){
      let diff=0;
      if(tb==='pts')diff=b.pts-a.pts;
      else if(tb==='td')diff=(b.gf-b.ga)-(a.gf-a.ga);
      else if(tb==='gf')diff=b.gf-a.gf;
      else if(tb==='ga')diff=a.ga-b.ga;
      else if(tb==='wins')diff=b.w-a.w;
      else if(tb==='losses')diff=a.l-b.l;
      else if(tb==='h2h'){
        const ah=a.h2hMap[b.t],bh=b.h2hMap[a.t];
        const ap=(ah?.pts||0),bp=(bh?.pts||0);
        if(ap!==bp){diff=bp-ap;}
        else{const agd=(ah?.gd||0),bgd=(bh?.gd||0);diff=bgd-agd;}
      }
      if(diff!==0)return diff;
    }
    return 0;
  });
}

// ═══════════════════════════════════════════════════════════════════════
// KO BRACKET
// ═══════════════════════════════════════════════════════════════════════
function koSeeds(t){
  const gNames=Object.keys(t.groups);
  if(!gNames.length)return[];
  const byGroup={};
  gNames.forEach(g=>{byGroup[g]=calcStandings(t,g);});
  if(gNames.length===2){
    const [gA,gB]=gNames;
    const acA=advanceCount(t,gA), acB=advanceCount(t,gB);
    const maxR=Math.max(acA,acB);
    const seA=[], seB=[];
    for(let r=0;r<maxR;r++){
      seA.push({team:r<acA?(byGroup[gA][r]?.t||null):null,label:`${r+1}. ${gA}`});
      seB.push({team:r<acB?(byGroup[gB][r]?.t||null):null,label:`${r+1}. ${gB}`});
    }
    // Build seeds for cross-group bracket:
    // Block pattern: for each pair of ranks (r1=2k, r2=2k+1):
    //   k even: [A[r1], B[r2], B[r1], A[r2]]  → VF: A[r1] vs A[r2+2k], B[r2] vs B[r1+...]
    //   k odd:  [B[r1], A[r2], A[r1], B[r2]]
    // This produces: VF1:1A-4B, VF2:2B-3A, VF3:1B-4A, VF4:2A-3B (for maxR=4)
    const seeds=[];
    for(let k=0;k<Math.ceil(maxR/2);k++){
      const r1=2*k, r2=2*k+1;
      if(k%2===0){
        if(r1<maxR)seeds.push(seA[r1]);
        if(r2<maxR)seeds.push(seB[r2]);
        if(r1<maxR)seeds.push(seB[r1]);
        if(r2<maxR)seeds.push(seA[r2]);
      } else {
        if(r1<maxR)seeds.push(seB[r1]);
        if(r2<maxR)seeds.push(seA[r2]);
        if(r1<maxR)seeds.push(seA[r1]);
        if(r2<maxR)seeds.push(seB[r2]);
      }
    }
    return seeds;
  }

  // Generic multi-group
  const seeds=[];
  const maxAC=Math.max(...gNames.map(g=>advanceCount(t,g)),0);
  for(let rank=0;rank<maxAC;rank++){
    gNames.forEach(g=>{
      if(rank<advanceCount(t,g))
        seeds.push({team:byGroup[g][rank]?.t||null,label:`${rank+1}. ${g}`});
    });
  }
  return seeds;
}
function koMatchKey(r,i){return`ko_${r}_${i}`}
function koMatchups(t){
  // Build all matchups WITHOUT recursion - use stored results only
  const seeds=koSeeds(t);
  const n=seeds.length;
  if(n<2)return[];
  const ms=[];
  let lo=[...seeds],hi=[];
  while(lo.length>1){hi.push({home:lo.shift(),away:lo.pop()});}
  if(lo.length===1)hi.push({home:lo[0],away:{team:null,label:'BYE'}});
  // Store R1
  const r1names=[];
  hi.forEach((m,i)=>{
    const key=koMatchKey(1,i);
    const ov=(t.koOverrides||{})[key]||{};
    const rawHome=m.home.team||m.home.label;
    const rawAway=m.away.team||m.away.label;
    const home=ov.home||rawHome;
    const away=ov.away||rawAway;
    const bye=!ov.away&&m.away.label==='BYE';
    ms.push({key,round:1,idx:i,home,away,bye,matchNum:i+1});
    r1names.push({home,away,bye,matchNum:i+1});
  });
  // Build subsequent rounds non-recursively
  let prevNames=r1names;
  let rn=2;
  while(prevNames.length>1){
    const cur=[];
    for(let i=0;i<prevNames.length;i+=2){
      const keyA=koMatchKey(rn-1,i);
      const keyB=koMatchKey(rn-1,i+1);
      const resA=t.koResults[keyA];
      const resB=t.koResults[keyB];
      const pA=prevNames[i];
      const pB=prevNames[i+1];
      const wA=resA&&resA.hg!==null?(resA.hg>resA.ag?pA.home:resA.ag>resA.hg?pA.away:null):null;
      const wB=pB?(resB&&resB.hg!==null?(resB.hg>resB.ag?pB.home:resB.ag>resB.hg?pB.away:null):null):null;
      const homeLabel=wA||`Sieger R${rn-1} Spiel ${i+1}`;
      const awayLabel=pB?(wB||`Sieger R${rn-1} Spiel ${i+2}`):'BYE';
      const bye=awayLabel==='BYE'||!pB;
      const subKey=koMatchKey(rn,Math.floor(i/2));
      const subOv=(t.koOverrides||{})[subKey]||{};
      const finalHome=subOv.home||homeLabel;
      const finalAway=subOv.away||awayLabel;
      ms.push({key:subKey,round:rn,idx:Math.floor(i/2),home:finalHome,away:finalAway,bye:finalAway==='BYE'&&!subOv.away,matchNum:Math.floor(i/2)+1});
      cur.push({home:homeLabel,away:awayLabel,bye});
    }
    prevNames=cur;rn++;
  }
  return ms;
}
function koWinner(t,round,idx){
  const key=koMatchKey(round,idx);
  const res=t.koResults[key];
  if(!res||res.hg===null||res.ag===null)return null;
  const ms=koMatchups(t);
  const m=ms.find(x=>x.key===key);
  if(!m)return null;
  if(res.tiebreak==='h')return m.home;
  if(res.tiebreak==='a')return m.away;
  return res.hg>res.ag?m.home:res.ag>res.hg?m.away:null;
}
function koRounds(t){
  const ms=koMatchups(t);if(!ms.length)return[];
  const max=Math.max(...ms.map(m=>m.round));
  const rounds=[];
  for(let r=1;r<=max;r++)rounds.push({round:r,matches:ms.filter(m=>m.round===r)});
  return rounds;
}

function matchLabel(round, totalRounds, idx){
  const fe=totalRounds-round;
  if(fe===0)return 'Finale';
  if(fe===1)return 'HF'+(idx+1);
  if(fe===2)return 'VF'+(idx+1);
  if(fe===3)return 'AF'+(idx+1);
  return 'R'+round+'/'+(idx+1);
}

function roundName(r,total){
  const fe=total-r;
  if(fe===0)return'Finale';if(fe===1)return'Halbfinale';if(fe===2)return'Viertelfinale';if(fe===3)return'Achtelfinale';
  return`Runde ${r}`;
}

function saveKO(key){
  const t=T();if(!t)return;
  const h=parseInt(document.getElementById(key+'_h')?.value),a=parseInt(document.getElementById(key+'_a')?.value);
  if(isNaN(h)||isNaN(a)||h<0||a<0){alert('Bitte gültige Ergebnisse!');return;}

function deWinner(m){if(m.hg===null)return null;return m.hg>m.ag?m.home:m.ag>m.hg?m.away:null;}
function deLoser(m){if(m.hg===null)return null;return m.hg>m.ag?m.away:m.ag>m.hg?m.home:null;}
function deInit(t){
  const ds=t.deState;
  const seeds=koSeeds(t);
  if(!ds.wbR1.length){
    ds.wbR1=[];
    const n=Math.max(seeds.length,2);
    const slots=Math.pow(2,Math.ceil(Math.log2(n)));
    for(let i=0;i<slots/2;i++){
      ds.wbR1.push({key:`de_wbR1_${i}`,home:seeds[i*2]?.team||seeds[i*2]?.label||`Seed ${i*2+1}`,away:seeds[i*2+1]?.team||seeds[i*2+1]?.label||`Seed ${i*2+2}`,hg:null,ag:null});
    }
    if(!ds.wbSF.length)ds.wbSF=[{key:'de_wbSF_0',home:'WBR1-A Sieger',away:'WBR1-B Sieger',hg:null,ag:null}];
    if(!ds.lbR1.length)ds.lbR1=[{key:'de_lbR1_0',home:'WBR1-A Verlierer',away:'WBR1-B Verlierer',hg:null,ag:null}];
    if(!ds.lbR2.length)ds.lbR2=[{key:'de_lbR2_0',home:'LBR1 Sieger',away:'WB-SF Verlierer',hg:null,ag:null}];
    if(!ds.lbSF.length)ds.lbSF=[{key:'de_lbSF_0',home:'WB-Finalist',away:'LBR2 Sieger',hg:null,ag:null}];
    if(!ds.grandFinal.length)ds.grandFinal=[{key:'de_gf',home:'WB-Sieger',away:'LB-Sieger',hg:null,ag:null}];
  }
}
function propagateDE(t){
  const ds=t.deState;
  if(ds.wbR1[0]&&ds.wbR1[1]){
    if(ds.wbSF[0]){ds.wbSF[0].home=deWinner(ds.wbR1[0])||'WBR1-A Sieger';ds.wbSF[0].away=deWinner(ds.wbR1[1])||'WBR1-B Sieger';}
    if(ds.lbR1[0]){ds.lbR1[0].home=deLoser(ds.wbR1[0])||'WBR1-A Verlierer';ds.lbR1[0].away=deLoser(ds.wbR1[1])||'WBR1-B Verlierer';}
  }
  // LB R2: LBR1 Sieger vs WB-SF Verlierer (NOT WB-QF — this is the fix)
  if(ds.lbR2[0]){ds.lbR2[0].home=deWinner(ds.lbR1[0])||'LBR1 Sieger';ds.lbR2[0].away=deLoser(ds.wbSF[0])||'WB-SF Verlierer';}
  if(ds.lbSF[0]){ds.lbSF[0].home=deWinner(ds.wbSF[0])||'WB-Finalist';ds.lbSF[0].away=deWinner(ds.lbR2[0])||'LBR2 Sieger';}
  if(ds.grandFinal[0]){ds.grandFinal[0].home=deWinner(ds.wbSF[0])||'WB-Finalist';ds.grandFinal[0].away=deWinner(ds.lbSF[0])||'LB-Finalist';}
}

}

function minToTime(m){if(m===null||isNaN(m))return'';const h=Math.floor(m/60)%24,mn=m%60;return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;}

function autoFillKOTimes(){
  const t=T();if(!t)return;
  ensureBracket(t);
  const dur=t.schedMatchDuration||45;
  const brk=t.schedBreak||15;
  const step=dur+brk;
  let cur=timeToMin(t.koFirstTime)||840;
  const pauseBlocks=(t.schedPauses||[]).map(p=>({from:timeToMin(p.from),to:timeToMin(p.to)})).filter(p=>p.from!==null&&p.to!==null);
  function skipPauses(m){let ch=true;while(ch){ch=false;for(const p of pauseBlocks){if(m>=p.from&&m<p.to){m=p.to;ch=true;}}}return m;}
  (t.bracket?.matches||[]).filter(m=>!m.disabled&&m.awaySlot?.type!=='bye').forEach(m=>{
    cur=skipPauses(cur);
    m.time=minToTime(cur);
    cur+=step;
  });
  showPage('bracket');
}
function autoFillKOTimes_old(){

  function skipPauses(m){let changed=true;while(changed){changed=false;for(const p of pauseBlocks){if(m>=p.from&&m<p.to){m=p.to;changed=true;}}}return m;}
  rounds.forEach(rnd=>{
    rnd.matches.forEach(m=>{

function confirmAutoTimes(){
  const t=T();if(!t)return;
  t.schedFirstTime=document.getElementById('at-first')?.value||'10:00';
  t.schedMatchDuration=parseInt(document.getElementById('at-dur')?.value)||45;
  t.schedBreak=parseInt(document.getElementById('at-brk')?.value)||15;
  const atMode=document.getElementById('at-mode')?.value||'interleave';
  const pauses=[];
  (t.schedPauses||[]).forEach((_,i)=>{
    const from=document.getElementById(`p_from_${i}`)?.value;
    const to=document.getElementById(`p_to_${i}`)?.value;
    if(from&&to)pauses.push({from,to});
  });
  t.schedPauses=pauses;
  const gNamesAT=Object.keys(t.groups);
  const selGroups=gNamesAT.filter(g=>{
    const cbId='atg_'+g.replace(/\s/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
    const el=document.getElementById(cbId);
    return el?el.checked:true;
  });
  const activeGroups=selGroups.length>0?selGroups:gNamesAT;
  t._atGroups=activeGroups;
  t._atMode=atMode;
  document.getElementById('auto-time-modal')?.remove();
  const dur=t.schedMatchDuration||45;
  const brk=t.schedBreak||15;
  const step=dur+brk;
  let cur=timeToMin(t.schedFirstTime)||600;
  const pauseBlocks=(t.schedPauses||[]).map(p=>({from:timeToMin(p.from),to:timeToMin(p.to)})).filter(p=>p.from!==null&&p.to!==null);
  function skipPauses(m){let ch=true;while(ch){ch=false;for(const p of pauseBlocks){if(m>=p.from&&m<p.to){m=p.to;ch=true;}}}return m;}
  const gMatchMap={};
  activeGroups.forEach(g=>{gMatchMap[g]=t.matches.filter(m=>m.grp===g);});
  let ordered=[];
  if(atMode==='sequential'){
    activeGroups.forEach(g=>{ordered.push(...gMatchMap[g]);});
  } else {
    const maxLen=Math.max(...activeGroups.map(g=>gMatchMap[g].length));
    for(let i=0;i<maxLen;i++){
      activeGroups.forEach(g=>{if(gMatchMap[g][i])ordered.push(gMatchMap[g][i]);});
    }
  }
  ordered.forEach(m=>{cur=skipPauses(cur);m.time=minToTime(cur);cur+=step;});
  showPage('schedule');
}

function genMatches(){
  const t=T();if(!t)return;
  if(!confirm('Spielplan neu generieren? Bestehende Ergebnisse bleiben erhalten.'))return;
  const ex={};
  t.matches.forEach(m=>{ex[m.home+'|'+m.away]=m;ex[m.away+'|'+m.home]=m;});
  // Home/away balance tracker
  const homeC={},awayC={};
  t.teams.forEach(tm=>{homeC[tm]=0;awayC[tm]=0;});
  function assignHome(a,b){
    const sA=Math.abs(homeC[a]+1-awayC[a])+Math.abs(homeC[b]-(awayC[b]+1));
    const sB=Math.abs(homeC[b]+1-awayC[b])+Math.abs(homeC[a]-(awayC[a]+1));
    return sA<=sB?a:b;
  }
  // Round-robin circle algorithm: fix first team, rotate rest
  function rrRounds(teams){
    const lst=[...teams];
    if(lst.length%2===1)lst.push('__BYE__');
    const n=lst.length,rounds=[];
    for(let r=0;r<n-1;r++){
      const ms=[];
      for(let i=0;i<n/2;i++){
        const a=lst[i],b=lst[n-1-i];
        if(a!=='__BYE__'&&b!=='__BYE__')ms.push([a,b]);
      }
      rounds.push(ms);
      lst.splice(1,0,lst.pop());
    }
    return rounds;
  }
  // Build per-group rounds with balanced home/away
  // _groupRounds: how many times each team plays every opponent (default 1)
  const numRounds=t._groupRounds||1;
  const groupRounds={};
  Object.entries(t.groups).forEach(([g,teams])=>{
    const base=rrRounds(teams);
    // Repeat round-robin for multi-round tournaments
    const allRounds=[];
    for(let rep=0;rep<numRounds;rep++){
      // Alternate home/away on even repetitions for fairness
      const flipped=rep%2===1;
      base.forEach(rnd=>allRounds.push(rnd.map(([a,b])=>flipped?[b,a]:[a,b])));
    }
    groupRounds[g]=allRounds.map(rnd=>rnd.map(([a,b])=>{
      const home=assignHome(a,b),away=home===a?b:a;
      homeC[home]++;awayC[away]++;
      const e=ex[home+'|'+away]||ex[away+'|'+home];
      return e?{...e,grp:g,home,away}:{grp:g,home,away,hg:null,ag:null,played:false,time:''};
    }));
  });
  // Interleave rounds across groups, greedy no-back-to-back within each round
  const result=[],lastPos={};
  const gNames=Object.keys(groupRounds);
  const maxR=Math.max(...gNames.map(g=>groupRounds[g].length));
  for(let r=0;r<maxR;r++){
    const pool=[];
    gNames.forEach(g=>{if(groupRounds[g][r])pool.push(...groupRounds[g][r]);});
    const remaining=[...pool];
    while(remaining.length>0){
      let best=-Infinity,bestIdx=0;
      remaining.forEach((m,i)=>{
        const pos=result.length;
        const hGap=pos-(lastPos[m.home]??-99),aGap=pos-(lastPos[m.away]??-99);
        const btb=(hGap===1||aGap===1)?-1000:0;
        const score=btb+Math.min(Math.min(hGap,aGap),4)*10;
        if(score>best){best=score;bestIdx=i;}
      });
      const chosen=remaining.splice(bestIdx,1)[0];
      lastPos[chosen.home]=result.length;lastPos[chosen.away]=result.length;
      result.push(chosen);
    }
  }
  let id=1;t.matches=result.map(m=>({...m,id:id++}));
  showPage('schedule');
}

function cbInit(t,slots){
  const rounds=Math.log2(slots);
  const roundNames=['Achtelfinale','Viertelfinale','Halbfinale','Finale'];
  const rn=[];
  for(let r=0;r<rounds;r++){
    const rem=slots/Math.pow(2,r);
    if(rem===2)rn.push('Finale');
    else if(rem===4)rn.push('Halbfinale');
    else if(rem===8)rn.push('Viertelfinale');
    else if(rem===16)rn.push('Achtelfinale');
    else rn.push(`Runde ${r+1}`);
  }
  const oldRounds=t.customBracket.rounds||[];
  const newRounds=[];
  for(let r=0;r<rounds;r++){
    const mc=slots/Math.pow(2,r+1);
    const old=oldRounds[r]||[];
    const matches=[];
    for(let m=0;m<mc;m++){
      matches.push(old[m]||{home:'',away:'',hg:null,ag:null});
    }
    newRounds.push({name:rn[r],matches});
  }
  t.customBracket={slots,rounds:newRounds};
}

// UNIFIED BRACKET ENGINE v0.18
// ═══════════════════════════════════════════════════════════════════════════

// ── BRACKET GENERATION ───────────────────────────────────────────────────
// A bracket is: { matches: [{id, label, round, homeSlot, awaySlot, result, time, disabled}],
//                 edges: [{fromId, toId, toSlot:'home'|'away', type:'winner'|'loser'}] }
// A slot: {type:'seed'|'winner'|'loser'|'bye'|'team', value, sourceId?}

function bracketSlotLabel(slot, t) {
  if (!slot) return '—';
  if (slot.type === 'bye') return 'BYE / Freilos';
  if (slot.type === 'team') return slot.value || '—';
  if (slot.type === 'winner' || slot.type === 'loser') {
    // Show the CURRENT (possibly edited) label of the source match, not its static id
    const prefix = slot.type === 'winner' ? 'Sieger ' : 'Verlierer ';
    const srcMatch = t?.bracket?.matches?.find(m => m.id === slot.sourceId);
    const srcLabel = srcMatch?.label || (slot.sourceId || '?').toUpperCase();
    return prefix + srcLabel;
  }
  if (slot.type === 'seed') {
    if (t && t.koPhase) {
      const resolved = resolveSeedLabel(t, slot.value);
      if (resolved && resolved !== slot.value) return resolved;
    }
    return slot.value || '—';
  }
  return '—';
}

function resolveSeedLabel(t, label) {
  // "1. Gruppe A" → actual team from standings
  if (!label) return label;
  const match = label.match(/^(\d+)\. (.+)$/);
  if (!match) return label; // already a team name
  const rank = parseInt(match[1]) - 1;
  const gName = match[2];
  if (t.groups[gName]) {
    const st = calcStandings(t, gName);
    return st[rank]?.t || label;
  }
  return label;
}

function bracketSlotTeam(t, slot) {
  // Resolve slot to actual team name (following edges through results)
  if (!slot) return null;
  if (slot.type === 'team') return slot.value;
  if (slot.type === 'bye') return null;
  if (slot.type === 'seed') {
    if (t.koPhase) return resolveSeedLabel(t, slot.value);
    return null;
  }
  if (slot.type === 'winner' || slot.type === 'loser') {
    const srcMatch = t.bracket?.matches?.find(m => m.id === slot.sourceId);
    if (!srcMatch || !srcMatch.result) return null;
    const res = srcMatch.result;
    const homeTeam = bracketSlotTeam(t, srcMatch.homeSlot);
    const awayTeam = bracketSlotTeam(t, srcMatch.awaySlot);
    const homeWins = res.tiebreak === 'h' || (!res.tiebreak && res.hg > res.ag);
    const awayWins = res.tiebreak === 'a' || (!res.tiebreak && res.ag > res.hg);
    const winner = homeWins ? homeTeam : awayWins ? awayTeam : null;
    const loser = homeWins ? awayTeam : awayWins ? homeTeam : null;
    return slot.type === 'winner' ? winner : loser;
  }
  return null;
}



function getRoundLabel(t, r) {
  if (!t.bracket) return roundName(r, 1);
  const totalR = Math.max(...t.bracket.matches.map(m => m.round));
  return t.bracket.roundLabels?.[r] || roundName(r, totalR);
}
function editRoundLabel(r) {
  const t = T(); if (!t || !t.bracket) return;
  if (!t.bracket.roundLabels) t.bracket.roundLabels = {};
  const totalR = Math.max(...t.bracket.matches.map(m => m.round));
  const cur = t.bracket.roundLabels[r] || roundName(r, totalR);
  const val = prompt('Rundenbezeichnung:', cur);
  if (val === null) return;
  const trimmed = val.trim();
  if (!trimmed || trimmed === roundName(r, totalR)) {
    delete t.bracket.roundLabels[r];
  } else {
    t.bracket.roundLabels[r] = trimmed;
  }
  showPage('bracket');
}

function resizeBracket(slots) {
  const t = T(); if (!t) return;
  if (!confirm('Bracket-Größe ändern? Alle bisherigen Verbindungen und Ergebnisse gehen verloren.')) return;
  t.bracketSlots = parseInt(slots);
  t.bracket = null;
  ensureBracket(t);
  showPage('bracket');
}

function generateBracket(t, forcedSlots) {
  // Build bracket from seeds. Number of slots = next power of 2 >= seeds (or forcedSlots).
  const seeds = koSeeds(t);
  const n = seeds.length;
  if (n < 2) return null;
  const minSlots = Math.pow(2, Math.ceil(Math.log2(Math.max(n, 2))));
  const slots = forcedSlots && forcedSlots >= minSlots ? forcedSlots : minSlots;
  const rounds = Math.log2(slots);
  // Pad with byes
  const paddedSeeds = [...seeds];
  while (paddedSeeds.length < slots) paddedSeeds.push(null); // null = bye

  // Round names
  const roundName = (r, totalR) => {
    const fe = totalR - r;
    if (fe === 0) return 'Finale';
    if (fe === 1) return 'Halbfinale';
    if (fe === 2) return 'Viertelfinale';
    if (fe === 3) return 'Achtelfinale';
    return 'Runde ' + r;
  };
  const shortName = (r, totalR, idx) => {
    const fe = totalR - r;
    if (fe === 0) return 'F';
    if (fe === 1) return 'HF' + (idx + 1);
    if (fe === 2) return 'VF' + (idx + 1);
    if (fe === 3) return 'AF' + (idx + 1);
    return 'R' + r + '_' + (idx + 1);
  };

  const matches = [];
  const edges = [];

  // Round 1: pair seeds (1 vs last, 2 vs 2nd-last)
  const r1pairs = [];
  let lo = [...paddedSeeds], hi = [];
  while (lo.length > 1) { hi.push({ a: lo.shift(), b: lo.pop() }); }
  if (lo.length === 1) hi.push({ a: lo[0], b: null });

  hi.forEach(({ a, b }, i) => {
    const id = shortName(1, rounds, i).toLowerCase();
    const isBye = !b;
    matches.push({
      id, label: shortName(1, rounds, i), round: 1, idx: i,
      roundLabel: roundName(1, rounds),
      homeSlot: a ? { type: 'seed', value: a.label } : { type: 'bye' },
      awaySlot: isBye ? { type: 'bye' } : { type: 'seed', value: b ? b.label : 'BYE' },
      result: null, time: '', disabled: false
    });
  });

  // Subsequent rounds: wire winners
  let prevRound = hi.map((_, i) => shortName(1, rounds, i).toLowerCase());
  for (let rn = 2; rn <= rounds; rn++) {
    const cur = [];
    for (let i = 0; i < prevRound.length; i += 2) {
      const id = shortName(rn, rounds, Math.floor(i / 2)).toLowerCase();
      const srcA = prevRound[i];
      const srcB = prevRound[i + 1] || null;
      matches.push({
        id, label: shortName(rn, rounds, Math.floor(i / 2)), round: rn, idx: Math.floor(i / 2),
        roundLabel: roundName(rn, rounds),
        homeSlot: { type: 'winner', sourceId: srcA },
        awaySlot: srcB ? { type: 'winner', sourceId: srcB } : { type: 'bye' },
        result: null, time: '', disabled: false
      });
      edges.push({ fromId: srcA, toId: id, toSlot: 'home', type: 'winner' });
      if (srcB) edges.push({ fromId: srcB, toId: id, toSlot: 'away', type: 'winner' });
      cur.push(id);
    }
    prevRound = cur;
  }

  return { matches, edges, roundLabels: {} };
}

function ensureBracket(t) {
  if (!t.bracket) t.bracket = generateBracket(t, t.bracketSlots||null);
  return t.bracket;
}

function bracketMatchResult(t, matchId) {
  const m = t.bracket?.matches?.find(x => x.id === matchId);
  return m?.result || null;
}

function bracketWinner(t, matchId) {
  const m = t.bracket?.matches?.find(x => x.id === matchId);
  if (!m || !m.result) return null;
  const res = m.result;
  const homeTeam = bracketSlotTeam(t, m.homeSlot);
  const awayTeam = bracketSlotTeam(t, m.awaySlot);
  const homeWins = res.tiebreak === 'h' || (!res.tiebreak && Math.floor(res.hg) > Math.floor(res.ag));
  const awayWins = res.tiebreak === 'a' || (!res.tiebreak && Math.floor(res.ag) > Math.floor(res.hg));
  return homeWins ? homeTeam : awayWins ? awayTeam : null;
}

// Drag state for customize mode
const DRAG = { active: false, matchId: null, type: 'winner', shiftHeld: false };
const SEL_EDGE = { edgeIdx: -1 }; // selected edge index

function bracketDragStart(e, matchId) {
  DRAG.active = true;
  DRAG.matchId = matchId;
  DRAG.type = e.shiftKey ? 'loser' : 'winner';
  DRAG.shiftHeld = e.shiftKey;
  e.dataTransfer.effectAllowed = 'link';
  e.dataTransfer.setData('text/plain', matchId);
  document.querySelectorAll('[data-match-id]').forEach(el => {
    if (el.dataset.matchId !== matchId) el.classList.add('bracket-drop-target');
  });
}
function bracketDragEnd() {
  DRAG.active = false;
  document.querySelectorAll('.bracket-drop-target, .bracket-drag-over').forEach(el => {
    el.classList.remove('bracket-drop-target', 'bracket-drag-over');
  });
}
function bracketDragOver(e, matchId, slot) {
  e.preventDefault();
  e.currentTarget.classList.add('bracket-drag-over');
}
function bracketDragLeave(e) {
  e.currentTarget.classList.remove('bracket-drag-over');
}
function bracketDrop(e, toMatchId, toSlot) {
  e.preventDefault();
  e.currentTarget.classList.remove('bracket-drag-over');
  const fromMatchId = DRAG.matchId || e.dataTransfer.getData('text/plain');
  const edgeType = e.shiftKey || DRAG.shiftHeld ? 'loser' : 'winner';
  if (!fromMatchId || fromMatchId === toMatchId) return;
  const t = T(); if (!t || !t.bracket) return;
  // Check if slot already has a connection
  const existing = t.bracket.edges.find(ed => ed.toId === toMatchId && ed.toSlot === toSlot);
  if (existing) {
    if (!confirm('Dieser Slot hat bereits eine Verbindung. Ersetzen?')) return;
    t.bracket.edges = t.bracket.edges.filter(ed => !(ed.toId === toMatchId && ed.toSlot === toSlot));
  }
  // Add edge
  t.bracket.edges.push({ fromId: fromMatchId, toId: toMatchId, toSlot, type: edgeType });
  // Update the match slot
  const toMatch = t.bracket.matches.find(m => m.id === toMatchId);
  if (toMatch) {
    const slotKey = toSlot === 'home' ? 'homeSlot' : 'awaySlot';
    toMatch[slotKey] = { type: edgeType, sourceId: fromMatchId };
  }
  DRAG.active = false;
  showPage('bracket');
}

function bracketToggleDisable(matchId) {
  const t = T(); if (!t || !t.bracket) return;
  const m = t.bracket.matches.find(x => x.id === matchId);
  if (!m) return;
  m.disabled = !m.disabled;
  if (m.disabled) {
    // Remove all edges to/from this match
    t.bracket.edges = t.bracket.edges.filter(
      ed => ed.fromId !== matchId && ed.toId !== matchId
    );
  }
  showPage('bracket');
}

function selectEdge(idx) {
  SEL_EDGE.edgeIdx = SEL_EDGE.edgeIdx === idx ? -1 : idx;
  showPage('bracket');
}

function clearAllEdges() {
  const t = T(); if (!t || !t.bracket) return;
  if (!confirm('Alle Verbindungen trennen? Die Bracket-Struktur wird geleert.')) return;
  t.bracket.edges = [];
  // Reset all non-R1 slots to empty
  t.bracket.matches.forEach(m => {
    if (m.homeSlot?.type === 'winner' || m.homeSlot?.type === 'loser') m.homeSlot = { type: 'seed', value: '—' };
    if (m.awaySlot?.type === 'winner' || m.awaySlot?.type === 'loser') m.awaySlot = { type: 'seed', value: '—' };
  });
  SEL_EDGE.edgeIdx = -1;
  showPage('bracket');
}
function deleteSelectedEdge() {
  const t = T(); if (!t || !t.bracket) return;
  if (SEL_EDGE.edgeIdx >= 0 && SEL_EDGE.edgeIdx < t.bracket.edges.length) {
    const ed = t.bracket.edges[SEL_EDGE.edgeIdx];
    // Also clear the slot in the target match
    const toMatch = t.bracket.matches.find(m => m.id === ed.toId);
    if (toMatch) {
      const slotKey = ed.toSlot === 'home' ? 'homeSlot' : 'awaySlot';
      toMatch[slotKey] = { type: 'seed', value: '—' };
    }
    t.bracket.edges.splice(SEL_EDGE.edgeIdx, 1);
    SEL_EDGE.edgeIdx = -1;
  }
  showPage('bracket');
}

function saveBracketResult(matchId) {
  const t = T(); if (!t || !t.bracket) return;
  const m = t.bracket.matches.find(x => x.id === matchId);
  if (!m) return;
  const h = parseInt(document.getElementById('br_h_' + matchId)?.value);
  const a = parseInt(document.getElementById('br_a_' + matchId)?.value);
  if (isNaN(h) || isNaN(a) || h < 0 || a < 0) { alert('Bitte gültige Ergebnisse!'); return; }
  if (h === a) {
    const homeT = bracketSlotTeam(t, m.homeSlot) || 'Heimteam';
    const awayT = bracketSlotTeam(t, m.awaySlot) || 'Auswärtsteam';
    showDrawModal(matchId, h, a, homeT, awayT);
    return;
  }
  m.result = { hg: h, ag: a };
  showPage('bracket');
}

function resetBracketResult(matchId) {
  const t = T(); if (!t || !t.bracket) return;
  const m = t.bracket.matches.find(x => x.id === matchId);
  if (m) m.result = null;
  showPage('bracket');
}

function saveBracketTime(matchId, val) {
  const t = T(); if (!t || !t.bracket) return;
  const m = t.bracket.matches.find(x => x.id === matchId);
  if (m) m.time = val;
}

function chkBracketSaveBtn(matchId) {
  const h = document.getElementById('br_h_' + matchId);
  const a = document.getElementById('br_a_' + matchId);
  const btn = document.getElementById('br_savebtn_' + matchId);
  if (btn) btn.classList.toggle('ready', !!(h && a && h.value !== '' && a.value !== ''));
}

// Confirm draw winner in new bracket system
function confirmDrawWinnerBracket(matchId, hg, ag) {
  const t = T(); if (!t || !t.bracket) return;
  const side = window._drawSide;
  if (!side) { alert('Bitte Sieger wählen!'); return; }
  const comment = document.getElementById('draw-comment')?.value.trim() || '';
  const m = t.bracket.matches.find(x => x.id === matchId);
  if (m) m.result = { hg: hg + (side === 'h' ? 0.1 : 0), ag: ag + (side === 'a' ? 0.1 : 0), comment, tiebreak: side };
  document.getElementById('draw-modal')?.remove();
  showPage('bracket');
}

schedule:()=>{
  const t=T();if(!t)return'';
  // view mode: 'group' or 'chrono'
  const vm=window._schedView||'group';
  const allM=[...t.matches];
  const chronoM=[...allM].sort((a,b)=>{
    const ta=timeToMin(a.time),tb2=timeToMin(b.time);
    if(ta===null&&tb2===null)return 0;if(ta===null)return 1;if(tb2===null)return-1;
    return ta-tb2;
  });
  function matchRow(m){
    return`<tr class="sched-row" draggable="true" data-mid="${m.id}"
      ondragstart="dStart(event,${m.id})" ondragend="dEnd(event)"
      ondragover="dOver(event,${m.id})" ondrop="dDrop(event,${m.id})">
      <td class="drag-handle">⠿</td>
      <td><input id="time${m.id}" value="${esc(m.time||'')}" placeholder="–" type="time"
        onchange="saveTime(${m.id},this.value)" style="width:80px;font-size:12px;padding:3px 5px"></td>
      <td><span class="badge" style="font-size:10px;${grpColor(t,m.grp)}">${esc(m.grp)}</span></td>
      <td style="font-weight:${m.played&&m.hg>m.ag?600:400}">${esc(m.home)}</td>
      <td class="col-result" style="text-align:center;white-space:nowrap">
        ${m.played
          ?`<strong>${m.hg} : ${m.ag}</strong>`
          :`<div style="display:flex;align-items:center;justify-content:center;gap:3px">
              <input class="score-inp" id="h${m.id}" type="number" placeholder="–" min="0" oninput="chkScoreBtn(${m.id})" style="width:38px">
              <span style="color:var(--muted);font-weight:700">:</span>
              <input class="score-inp" id="a${m.id}" type="number" placeholder="–" min="0" oninput="chkScoreBtn(${m.id})" style="width:38px">
            </div>`}
      </td>
      <td style="font-weight:${m.played&&m.ag>m.hg?600:400}">${esc(m.away)}</td>
      <td>${m.played
        ?`<span class="badge ${m.hg>m.ag?'badge-green':m.hg<m.ag?'badge-red':'badge-amber'}" style="font-size:10px">${m.hg>m.ag?'Heim':m.hg<m.ag?'Gast':'U'}</span>`
        :`<button class="btn btn-sm btn-primary save-btn" id="sbtn${m.id}" onclick="saveResult(${m.id})">✓</button>`}
      </td>
      <td>${m.played?`<button class="btn btn-ghost btn-sm" onclick="resetResult(${m.id})">✎</button>`:''}</td>
    </tr>`;
  }
  const thead=`<colgroup><col class="col-drag"><col class="col-time"><col class="col-grp"><col class="col-team"><col class="col-result"><col class="col-team"><col class="col-status"><col class="col-action"></colgroup><thead><tr><th class="col-drag"></th><th class="col-time">⏰ Zeit</th><th class="col-grp">Gruppe</th><th class="col-team">Heim</th><th class="col-result" style="text-align:center">Ergebnis</th><th class="col-team">Gast</th><th class="col-status"></th><th class="col-action"></th></tr></thead>`;
  let body='';
  if(vm==='chrono'){
    body=`<div class="card">
      <div class="card-header"><h3>Alle Spiele – chronologisch</h3><span class="badge badge-blue">${allM.length}</span></div>
      <table class="table sched-table">${thead}<tbody>${chronoM.map(m=>matchRow(m)).join('')}</tbody></table>
    </div>`;
  } else {
    body=Object.keys(t.groups).map(g=>`
    <div class="card">
      <div class="card-header">
        <h3>${esc(g)}</h3>
        <span class="badge badge-green">${t.matches.filter(m=>m.grp===g&&m.played).length}/${t.matches.filter(m=>m.grp===g).length}</span>
      </div>
      <table class="table sched-table">${thead}<tbody>${t.matches.filter(m=>m.grp===g).map(m=>matchRow(m)).join('')}</tbody></table>
    </div>`).join('');
  }
  return`
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
  <h1>📅 Spielplan</h1>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <button class="btn btn-sm ${vm==='group'?'btn-primary':''}" onclick="window._schedView='group';showPage('schedule')">Nach Gruppe</button>
    <button class="btn btn-sm ${vm==='chrono'?'btn-primary':''}" onclick="window._schedView='chrono';showPage('schedule')">Chronologisch</button>
    <button class="btn btn-sm" onclick="autoFillTimes()">⏰ Auto-Zeiten</button>
    <button class="btn btn-sm" onclick="randomResults()" style="color:var(--amber)">🎲 Zufalls-Ergebnisse</button>
    <button class="btn btn-sm btn-primary" onclick="genMatches()">⚡ Generieren</button>
  </div>
</div>
${body}
${t.koPhase&&t.bracket?.matches?.length?`
<div class="card" style="margin-top:16px">
  <div class="card-header">
    <h3>🌳 K.O.-Phase</h3>
    <span class="badge badge-blue" style="font-size:11px">K.O.</span>
  </div>
  <table class="table sched-table">
    <thead><tr>
      <th class="col-time">⏰ Zeit</th>
      <th class="col-grp">Runde</th>
      <th class="col-team">Heim</th>
      <th class="col-result" style="text-align:center">Ergebnis</th>
      <th class="col-team">Gast</th>
      <th></th>
    </tr></thead>
    <tbody>
      ${t.bracket.matches.filter(m=>!m.disabled&&m.awaySlot?.type!=='bye').map(m=>{
        const homeTeam=bracketSlotTeam(t,m.homeSlot)||bracketSlotLabel(m.homeSlot,t);
        const awayTeam=bracketSlotTeam(t,m.awaySlot)||bracketSlotLabel(m.awaySlot,t);
        const res=m.result;
        const pl=!!res;
        const homeWins=pl&&(res.tiebreak==='h'||(!res.tiebreak&&Math.floor(res.hg||0)>Math.floor(res.ag||0)));
        const awayWins=pl&&(res.tiebreak==='a'||(!res.tiebreak&&Math.floor(res.ag||0)>Math.floor(res.hg||0)));
        return`<tr>
          <td style="color:var(--muted);font-size:12px">${esc(m.time||'—')}</td>
          <td><span class="badge badge-blue" style="font-size:10px">${esc(m.label)}</span></td>
          <td style="font-weight:${homeWins?'700':'400'};color:${homeWins?'var(--accent)':'var(--text)'}">${esc(homeTeam)}</td>

standings:()=>{

bracket:()=>{
  const t=T();if(!t)return'<p style="color:var(--muted)">Kein Turnier.</p>';
  const fmt=t.format||'group_ko';
  const customize=window._bracketCustomize||false;

  // Ensure bracket exists
  ensureBracket(t);
  const br=t.bracket;
  if(!br||!br.matches.length)return`<div style="margin-bottom:18px"><h1>🌳 K.O.-Bracket</h1></div>
    <div class="alert alert-amber"><span>⚠️</span><span>Keine Teams qualifiziert. Bitte Gruppen konfigurieren.</span></div>`;

  const totalRounds=Math.max(...br.matches.map(m=>m.round));
  window.totalRoundsForLabel=totalRounds;

  // Group matches by round
  const rounds=[];
  for(let r=1;r<=totalRounds;r++) rounds.push(br.matches.filter(m=>m.round===r));

  // Render a single match element
  function renderMatch(m){
    const res=m.result;
    const pl=!!(res);
    const homeTeam=bracketSlotTeam(t,m.homeSlot)||bracketSlotLabel(m.homeSlot,t);
    const awayTeam=bracketSlotTeam(t,m.awaySlot)||bracketSlotLabel(m.awaySlot,t);
    const homeWins=pl&&(res.tiebreak==='h'||(!res.tiebreak&&Math.floor(res.hg||0)>Math.floor(res.ag||0)));
    const awayWins=pl&&(res.tiebreak==='a'||(!res.tiebreak&&Math.floor(res.ag||0)>Math.floor(res.hg||0)));
    const isBye=m.awaySlot?.type==='bye';
    const disabled=m.disabled;

    // Header row (draggable in customize mode)
    const headerDrag=customize?` draggable="true" ondragstart="bracketDragStart(event,'${m.id}')" ondragend="bracketDragEnd()"`:'';
    const headerCls=`bracket-header${customize?' bracket-header-drag':''}`;

    // Slot droppable in customize mode
    const dropH=customize?` data-match-id="${m.id}" ondragover="bracketDragOver(event,'${m.id}','home')" ondragleave="bracketDragLeave(event)" ondrop="bracketDrop(event,'${m.id}','home')"`:'';
    const dropA=customize?` data-match-id="${m.id}" ondragover="bracketDragOver(event,'${m.id}','away')" ondragleave="bracketDragLeave(event)" ondrop="bracketDrop(event,'${m.id}','away')"`:'';
    const slotCls=customize?' bracket-slot-droppable':'';

    let html=`<div class="match-box${disabled?' bracket-match-disabled':''}" style="min-width:180px;${disabled?'opacity:.4;filter:grayscale(.6)':''}" data-match-id="${m.id}">`;

    // Header
    html+=`<div class="${headerCls}" style="padding:2px 8px;font-size:10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;${customize?'cursor:grab;background:rgba(59,130,246,.05)':''}"
      ${headerDrag}>
      <span style="font-weight:700;color:var(--muted);font-size:10px">${esc(m.label)}</span>
      <div style="display:flex;align-items:center;gap:4px">
        ${m.time?`<span style="color:var(--muted);font-size:9px">⏰${esc(m.time)}</span>`:''}
        ${customize?`<button onclick="bracketToggleDisable('${m.id}')" style="background:none;border:1px solid ${disabled?'var(--green-dim)':'var(--red-dim)'};border-radius:4px;cursor:pointer;color:${disabled?'var(--green)':'var(--red)'};font-size:11px;font-weight:700;padding:1px 5px;min-width:20px" title="${disabled?'Begegnung aktivieren':'Begegnung deaktivieren'}">${disabled?'+':'×'}</button>`:''}
      </div>
    </div>`;

    if(isBye){
      html+=`<div class="bracket-slot bracket-slot-home${slotCls}" ${dropH}><span style="flex:1">${esc(homeTeam)}</span></div>`;
      html+=`<div class="bracket-score-row"><span style="font-size:10px;color:var(--muted)">Freilos</span></div>`;
      html+=`<div class="bracket-slot" style="font-style:italic;color:var(--subtle);font-size:11px;padding:6px 9px">BYE</div>`;
    } else {
      // Home slot
      html+=`<div class="bracket-slot bracket-slot-home ${homeWins?'winner':pl&&awayWins?'loser':''}${slotCls}" ${dropH}${customize&&!pl?` onclick="editKOTeamsOpen('${m.id}','home')" title="Team bearbeiten"`:''}>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(homeTeam)}</span>
        ${homeWins?'<span style="font-size:9px">✓</span>':''}
      </div>`;

      // Score
      html+=`<div class="bracket-score-row">`;
      if(pl){
        html+=`<span class="bracket-score-big">${Math.floor(res.hg)} : ${Math.floor(res.ag)}</span>`;
        if(res.comment)html+=`<span style="font-size:9px;color:var(--muted);font-style:italic;margin-left:5px">${esc(res.comment)}</span>`;
      } else if(!disabled) {
        html+=`<input class="score-inp" id="br_h_${m.id}" type="number" min="0" placeholder="–" oninput="chkBracketSaveBtn('${m.id}')" style="width:38px">
          <span style="color:var(--muted);font-weight:700;margin:0 4px">:</span>
          <input class="score-inp" id="br_a_${m.id}" type="number" min="0" placeholder="–" oninput="chkBracketSaveBtn('${m.id}')" style="width:38px">`;
      } else {
        html+=`<span style="color:var(--subtle);font-size:11px">— : —</span>`;
      }
      html+='</div>';

      // Away slot
      html+=`<div class="bracket-slot ${awayWins?'winner':pl&&homeWins?'loser':''}${slotCls}" ${dropA}${customize&&!pl?` onclick="editKOTeamsOpen('${m.id}','away')" title="Team bearbeiten"`:''}>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(awayTeam)}</span>
        ${awayWins?'<span style="font-size:9px">✓</span>':''}
      </div>`;
    }

    // Action bar
    if(!disabled){
      if(pl){
        html+=`<div style="padding:3px 8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:10px;color:var(--green)">✅ ${esc(bracketWinner(t,m.id)||'—')}</span>
          <div style="display:flex;gap:3px">
            <button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="editKOComment('${m.id}')" title="Kommentar">💬</button>
            <button class="btn btn-ghost btn-sm" style="font-size:11px" onclick="resetBracketResult('${m.id}')">✎</button>
          </div>
        </div>`;
      } else {
        html+=`<div style="padding:4px 8px;border-top:1px solid var(--border)">
          <div style="display:flex;gap:4px">
            <button class="btn btn-sm btn-primary save-btn" id="br_savebtn_${m.id}" style="font-size:11px;flex:1" onclick="saveBracketResult('${m.id}')">✓ Speichern</button>
            <button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="editKOTeams('${m.id}','${esc(homeTeam)}','${esc(awayTeam)}')" title="Teams &amp; Zeit bearbeiten">✏️</button>
          </div>
        </div>`;
      }
    }

    html+='</div>';
    return html;
  }

  // Build SVG edge overlay
  // We render edges as colored lines between match elements
  // Since layout is flex/scroll, we use position:relative wrapper + absolute SVG
  // Simplified: show edge list in customize mode as badges

  const edgeBadges=customize?br.edges.map((ed,idx)=>{
    const sel=SEL_EDGE.edgeIdx===idx;
    return`<div onclick="selectEdge(${idx})" style="display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px;margin:3px;
      background:${sel?'var(--red-bg)':'var(--bg3)'};border:1px solid ${sel?'var(--red)':ed.type==='winner'?'var(--green-dim)':'var(--red-dim)'};color:${ed.type==='winner'?'var(--green)':'var(--red)'}">
      <span style="font-weight:700">${ed.fromId.toUpperCase()}</span>
      <span>→</span>
      <span>${ed.toId.toUpperCase()} ${ed.toSlot==='home'?'Heim':'Auswärts'}</span>
      <span style="font-size:10px;opacity:.7">(${ed.type==='winner'?'Sieger':'Verlierer'})</span>
      ${sel?'<span style="color:var(--red)">✕</span>':''}
    </div>`;
  }).join(''):'';

  // Final winner
  const finalMatch=br.matches.find(m=>m.round===totalRounds&&!m.disabled);
  const champion=finalMatch?bracketWinner(t,finalMatch.id):null;

  return`
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
  <div>
    <h1>🌳 K.O.-Bracket</h1>
    <div style="font-size:12px;color:var(--muted);margin-top:2px">${br.matches.filter(m=>!m.disabled).length} Begegnungen · ${br.matches.filter(m=>m.result&&!m.disabled).length} gespielt</div>
  </div>
  <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
    ${(()=>{
      const _seeds=koSeeds(t);const _n=_seeds.length;
      const _minS=Math.pow(2,Math.ceil(Math.log2(Math.max(_n,2))));
      const _cur=t.bracketSlots||_minS;
      const _opts=[];
      for(let s=_minS;s<=64;s*=2){
        const _rn=Math.log2(s);const _rLabel=_rn===0?'Finale':_rn===1?'Finale':_rn===2?'Halbfinale':_rn===3?'Viertelfinale':_rn===4?'Achtelfinale':_rn===5?'Sechzehntelfinale':_rn===6?'32-Finale':('ab R'+_rn);
        _opts.push('<option value="'+s+'"'+(s===_cur?' selected':'')+'>'+s+' Plätze (ab '+_rLabel+')</option>');
      }
      return '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;color:var(--muted)">Größe:</span><select onchange="resizeBracket(this.value)" style="font-size:12px;padding:4px 8px;width:auto">'+_opts.join('')+'</select></div>';
    })()}
    <button class="btn btn-sm" onclick="showKOTimesDialog()">⏰ Auto-Zeiten</button>
    <button class="btn btn-sm ${customize?'btn-primary':''}" onclick="window._bracketCustomize=!window._bracketCustomize;showPage('bracket')">
      ${customize?'✓ Fertig':'✏️ Bearbeiten'}
    </button>
  </div>
</div>

${customize?`<div class="alert alert-blue" style="margin-bottom:10px">
  <span>✏️</span>
  <span><strong>Bearbeitungsmodus:</strong>
  Ziehe die <strong>Kopfzeile</strong> (z.B. VF1) auf einen Team-Slot um eine Verbindung zu ziehen (grün = Sieger, mit Shift = rot = Verlierer).
  Klick auf eine Verbindung unten um sie zu markieren, dann löschen.
  <strong>×</strong> deaktiviert eine Begegnung, <strong>+</strong> aktiviert sie wieder.</span>
</div>`:''}

${champion?`<div style="text-align:center;padding:14px;background:var(--card);border-radius:var(--r-lg);border:1px solid var(--amber-dim);margin-bottom:14px">
  <div style="font-size:28px">🏆</div>
  <div style="font-weight:700;font-size:16px;color:var(--amber);margin-top:4px">${esc(champion)}</div>
  <div style="font-size:11px;color:var(--muted)">Turniersieger</div>
</div>`:''}

<div class="card${customize?' bracket-customize-mode':''}">
  <div class="bracket-wrap">
    <div class="bracket">
      ${rounds.map((rndMatches,ri)=>{
        const rn=ri+1;
        const visibleCount=rndMatches.filter(m=>!m.disabled).length;
        return`<div class="round-col">
          <div class="round-title" style="display:flex;align-items:center;justify-content:center;gap:4px">
            <span>${getRoundLabel(t,rn)}</span>
            ${customize?`<button onclick="editRoundLabel(${rn})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;line-height:1;padding:0 2px;opacity:.7" title="Bezeichnung ändern">✎</button>`:''}
          </div>
          <div class="matches-col" style="gap:8px">
            ${rndMatches.map(m=>`<div class="match-slot" style="${m.disabled?'opacity:.35':''}">
              ${renderMatch(m)}
            </div>`).join('')}
          </div>
        </div>
        ${ri<rounds.length-1?'<div class="conn-col"><div class="conn-line"></div></div>':''}`;
      }).join('')}
    </div>
  </div>
</div>

${customize&&br.edges.length?`<div class="card" style="margin-top:10px">
  <div class="card-header">
    <h3>Verbindungen</h3>
    <div style="display:flex;gap:6px;align-items:center">
      ${SEL_EDGE.edgeIdx>=0?`<button class="btn btn-sm btn-danger" onclick="deleteSelectedEdge()">✕ Löschen</button>`:'<span style="font-size:12px;color:var(--muted)">Klick zum Auswählen</span>'}
      <button class="btn btn-sm btn-danger" onclick="clearAllEdges()" title="Alle Verbindungen trennen">✕ Alle trennen</button>
    </div>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:0">${edgeBadges}</div>
</div>`:''}
`;},

custom_bracket:()=>{
  const t=T();if(!t)return'';
  const slots=t.customBracket?.slots||8;
  if(!t.customBracket?.rounds?.length||t.customBracket.slots!==slots)cbInit(t,slots);
  const rounds=t.customBracket.rounds;
  // Build qualifier options
  const qualOpts=[];
  const POSITIONS=['Gruppensieger','Gruppenzweiter','Gruppendritter','Gruppenvieter','Gruppenfünfter','Gruppensiebter','Gruppensiebter','Gruppenachter'];
  Object.keys(t.groups).forEach(g=>{
    const ac=advanceCount(t,g);
    for(let pi=0;pi<Math.min(ac,POSITIONS.length);pi++){
      qualOpts.push(POSITIONS[pi]+' '+g);
    }
  });
  rounds.forEach((rnd,ri)=>{
    rnd.matches.forEach((_,mi)=>{
      if(ri>0){
        qualOpts.push(`Sieger ${rounds[ri-1].name} ${mi*2+1}`);
        qualOpts.push(`Sieger ${rounds[ri-1].name} ${mi*2+2}`);
        qualOpts.push(`Verlierer ${rounds[ri-1].name} ${mi*2+1}`);
      }
    });
  });
  // Build slot labels: "VF Spiel 1" means match 1 of Viertelfinale
  const slotLabels=[];
  rounds.forEach((rnd,ri)=>{
    rnd.matches.forEach((match,mi)=>{
      const h=match.home||'?';const a=match.away||'?';
      const desc=rnd.name+' Sp.'+(mi+1)+': '+h+' vs. '+a;
      slotLabels.push('Sieger ('+desc+')');
      slotLabels.push('Verlierer ('+desc+')');
    });
  });
  const allOpts=`<option value="">— BYE / Freilos —</option>
    <optgroup label="Teams">${t.teams.map(tm=>`<option value="${esc(tm)}">${esc(tm)}</option>`).join('')}</optgroup>
    <optgroup label="Gruppen-Plätze">${qualOpts.map(q=>`<option value="${esc(q)}">${esc(q)}</option>`).join('')}</optgroup>
    <optgroup label="Runden-Weiterkommer">${slotLabels.map(sl=>`<option value="${esc(sl)}">${esc(sl)}</option>`).join('')}</optgroup>`;

  let bracketHTML='<div class="bracket">';
  rounds.forEach((rnd,ri)=>{
    bracketHTML+=`<div class="round-col"><div class="round-title">${esc(rnd.name)}</div><div class="matches-col" style="gap:6px">`;
    rnd.matches.forEach((m,mi)=>{
      const pl=m.hg!==null;
      const id=`cb_${ri}_${mi}`;
      const hc=pl?(m.hg>m.ag?'winner':m.hg<m.ag?'loser':''):'';
      const ac2=pl?(m.ag>m.hg?'winner':m.ag<m.hg?'loser':''):'';
      bracketHTML+=`<div class="match-slot"><div class="match-box" style="min-width:165px">
        <div class="mt ${hc}">
          ${pl?`<span style="flex:1;font-size:11px">${esc(m.home||'BYE')}</span><span class="mscore">${m.hg}</span>`
            :`<select id="${id}_h" style="font-size:11px;flex:1;border:none;background:transparent;color:var(--text);padding:0" onchange="cbUpdateSel(${ri},${mi},'h',this.value);cbChk(${ri},${mi})">${allOpts}</select>
              <input class="score-inp" id="${id}_hs" type="number" min="0" placeholder="" onfocus="if(this.value==='')this.value='0'" min="0" oninput="cbChk(${ri},${mi})" style="width:34px">`}
        </div>
        <div class="mdiv"></div>
        <div class="mt ${ac2}">
          ${pl?`<span style="flex:1;font-size:11px">${esc(m.away||'BYE')}</span><span class="mscore">${m.ag}</span>`
            :`<select id="${id}_a" style="font-size:11px;flex:1;border:none;background:transparent;color:var(--text);padding:0" onchange="cbUpdateSel(${ri},${mi},'a',this.value);cbChk(${ri},${mi})">${allOpts}</select>
              <input class="score-inp" id="${id}_as" type="number" min="0" placeholder="" onfocus="if(this.value==='')this.value='0'" min="0" oninput="cbChk(${ri},${mi})" style="width:34px">`}
        </div>
        ${pl?`<div style="padding:3px 8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:10px;color:var(--green)">✅ ${esc(m.hg>m.ag?m.home:m.away)}</span>
            <button class="btn btn-ghost btn-sm" style="font-size:11px" onclick="cbReset(${ri},${mi})">✎</button>
          </div>`
          :`<div style="padding:4px 8px;border-top:1px solid var(--border)">
            <button class="btn btn-sm save-btn" id="pairbtn_cb_${ri}_${mi}" style="font-size:11px" onclick="cbSave(${ri},${mi},'pair')" title="Paarung speichern (ohne Ergebnis)">👥 Paarung</button>
            <button class="btn btn-sm btn-primary save-btn" id="resbtn_cb_${ri}_${mi}" style="font-size:11px" onclick="cbSave(${ri},${mi},'result')">✓ Ergebnis</button>
          </div>`}
      </div></div>`;
    });
    bracketHTML+='</div></div>';
    if(ri<rounds.length-1)bracketHTML+='<div class="conn-col"><div class="conn-line"></div></div>';
  });
  bracketHTML+='</div>';
  return`
<div style="margin-bottom:18px"><h1>✏️ Custom Bracket Builder</h1></div>
<div class="alert alert-blue"><span>ℹ️</span><span>Freie Zuweisung: Teams, Gruppen-Plätze oder logische Platzhalter. BYE = Freilos (Team rückt vor). Kein Team doppelt in einer Begegnung.</span></div>
<div class="card">
  <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
    <div>
      <label class="form-label">Startplätze</label>
      <select id="cb-slots" style="width:150px" onchange="T().customBracket={slots:parseInt(this.value),rounds:[]};showPage('custom_bracket')">
        ${[4,8,16,32].map(n=>`<option value="${n}" ${slots===n?'selected':''}>${n} Plätze</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-danger btn-sm" onclick="if(confirm('Bracket zurücksetzen?')){T().customBracket={slots:${slots},rounds:[]};showPage('custom_bracket')}">🔄 Zurücksetzen</button>
  </div>
</div>
<div class="card"><div class="bracket-wrap">${bracketHTML}</div></div>`;
  // After render: restore saved team selections in selects and trigger button states
  setTimeout(()=>{
    rounds.forEach((rnd,ri)=>{
      rnd.matches.forEach((match,mi)=>{
        const idBase='cb_'+ri+'_'+mi;
        const hs=document.getElementById(idBase+'_h');
        const as=document.getElementById(idBase+'_a');
        if(hs&&match.home)hs.value=match.home;
        if(as&&match.away)as.value=match.away;
        cbChk(ri,mi);
      });
    });
  },30);
},

qr:()=>{
  const t=T();if(!t)return'';
  const base=window.location.origin+window.location.pathname;
  const url=`${base}?t=${encodeURIComponent(t.slug)}`;
  return`
<div style="margin-bottom:18px"><h1>📱 QR-Code & Teilen</h1></div>
<div class="alert alert-blue"><span>ℹ️</span><span>Dieser Link führt direkt zu <strong>diesem Turnier</strong> in der Public-Ansicht — auch wenn später weitere Turniere angelegt werden.</span></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

    <h3 style="margin-bottom:10px">Public Link</h3>

      <div style="display:flex;gap:7px;flex-wrap:wrap;justify-content:center">

  <div class="card">

      <input value="${esc(t.slug)}" id="slug-inp" oninput="updateQR(this.value)">

function confirmNewTourney(){
  const t=T();if(!t)return;
  const name=document.getElementById('set-name')?.value.trim();
  const sport=document.getElementById('set-sport')?.value;
  const fmt=document.getElementById('set-fmt')?.value;

  // Save all settings
  t.name=name;

  t.format=fmt||'group_ko';
  t.phase=document.getElementById('set-phase')?.value||'Gruppenphase';
  const slugInp=document.getElementById('set-slug')?.value.trim();
  t.slug=slugInp||name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  t.defaultAdvance=parseInt(document.getElementById('set-adv')?.value)||2;
  const nGroups=parseInt(document.getElementById('set-ngroups')?.value)||2;
  const tpg=parseInt(document.getElementById('set-teamspg')?.value)||6;
  t._teamsPerGroup=tpg;
  t._groupRounds=parseInt(document.getElementById('set-rounds')?.value)||1;
  // Auto-create groups
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  t.groups={};
  for(let i=0;i<nGroups;i++) t.groups['Gruppe '+letters[i%26]]=[];
  // Remove new flag
  delete t._isNew;
  updateSBForT();
  showPage('overview');
}
function autoUpdateSlug(name){
  const slugInp=document.getElementById('set-slug');
  if(slugInp)slugInp.value=name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
}
function cancelNewTourney(){
  const t=T();if(!t)return;
  // Remove the tournament and go back to home
  DB.tournaments=DB.tournaments.filter(x=>x.id!==t.id);
  DB.activeTournamentId=null;
  async function initApp(){
  // Tournament resolution priority:
  // 1) ?t=<slug> in URL — explicit tournament selection (what public links/QR codes use)
  // 2) Most recently synced tournament — admin convenience on reload
  try{
    const urlSlug=getTournamentSlugFromUrl();
    let resolved=null;
    if(urlSlug){
      resolved=await loadTournamentBySlugFromCloud(urlSlug);
    }
    if(!resolved){
      const ids=await loadAllTournamentIdsFromCloud();
      if(ids.length){
        const latestId=ids.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at))[0].id;
        resolved=await loadTournamentFromCloud(latestId);
      }
    }
    if(resolved){
      const idx=DB.tournaments.findIndex(x=>x.id===resolved.id);
      if(idx>=0) DB.tournaments[idx]=resolved; else DB.tournaments.unshift(resolved);
    }
    _resolvedTournamentId = resolved?.id || null;
    // If cloud was successfully contacted but returned no tournament,
    // clear demo data so we don't show stale/fake tournaments
    if(!resolved) DB.tournaments=[];
  }catch(e){ console.warn('Cloud restore failed, keeping local demo data:',e); _resolvedTournamentId=null; }
  _cloudLoaded=true;
  openHome(); // fav loaded per-tournament on tip login
  // openHome() resets activeTournamentId to null — re-apply our resolved tournament.
  if(_resolvedTournamentId) DB.activeTournamentId=_resolvedTournamentId;

  // Determine which page to restore from URL
  const _urlParams=new URLSearchParams(window.location.search);
  const _urlPage=_urlParams.get('page');

  // Admin access: only reachable via ?adminMode URL param + password
  if(checkAdminModeParam()){
    if(isAdminUnlocked()){
      setView('admin');
      // Only restore last page if a tournament is still active
      if(_urlPage&&pages[_urlPage]&&_resolvedTournamentId) showPage(_urlPage);
    } else {
      showAdminPasswordPrompt();
    }
  } else {
    setView('public');
  }

  checkTipUrlParam();
}
initApp();
}

async function bulkGenerateCodes(){

function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='';
  for(let i=0;i<4;i++){
    if(i>0)code+='-';
    for(let j=0;j<3;j++) code+=chars[Math.floor(Math.random()*chars.length)];
  }
  return code;
}

async function submitTip(matchId){
  if(!_tipSession){return;}
  // Validate inputs first (before any network call)
  const _hv=document.getElementById('tip_h_'+matchId)?.value.trim();
  const _av=document.getElementById('tip_a_'+matchId)?.value.trim();
  const h=_hv!==''?parseInt(_hv):NaN;
  const a=_av!==''?parseInt(_av):NaN;
  if(isNaN(h)||isNaN(a)||h<0||a<0||h>99||a>99){alert('Bitte gültigen Tipp eingeben (0–99)!');return;}
  // Lock the button immediately to prevent double-submit
  const btn=document.getElementById('tip_btn_'+matchId);
  if(btn){btn.disabled=true;btn.textContent='⏳';}
  // Always fetch fresh tournament data from cloud before checking match status
  // This prevents submitting a tip for a match that was locked after this page loaded
  try{
    const fresh=await pullLatestTournament(_tipSession.tournament_id);
    const t=fresh||DB.tournaments.find(x=>x.id===_tipSession.tournament_id);
    if(!t){if(btn){btn.disabled=false;btn.textContent='Tippen';}return;}
    const m=t.matches.find(x=>x.id==matchId)||(t.bracket?.matches||[]).find(x=>x.id==matchId);
    if(!m){if(btn){btn.disabled=false;btn.textContent='Tippen';}return;}
    // Server-side lock check with freshly loaded data
    if(m.played||m.result){
      alert('⛔ Dieses Spiel wurde inzwischen gestartet — der Tipp kann nicht mehr abgegeben werden.');
      if(btn){btn.disabled=false;btn.textContent='Gesperrt 🔒';}
      // Refresh the tip form so the match moves to "Abgeschlossen"
      setTimeout(()=>renderTipForm(),300);
      return;
    }
    const {error}=await _sb.from('tip_picks').upsert({
      participant_id: _tipSession.participant_id,
      tournament_id: _tipSession.tournament_id,
      match_id: String(matchId),
      home_goals: h,
      away_goals: a
    },{onConflict:'participant_id,match_id'});
    if(error){
      alert('Fehler beim Speichern: '+error.message);
      if(btn){btn.disabled=false;btn.textContent='Tippen';}
      return;
    }
    if(btn){btn.textContent='✅';setTimeout(()=>{btn.disabled=false;btn.textContent='Tipp aktualisieren';},1500);}
  }catch(e){
    alert('Netzwerkfehler: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Tippen';}
  }
}

function calcTipPoints(tipH,tipA,actualH,actualA,tippingPoints,isKO){
  // Returns {pts, category} — 'exact'|'diff'|'trend'|'none'
  // Supports split format {group:{...},ko:{...}} and legacy flat format
  if(actualH===null||actualH===undefined||tipH===null||tipH===undefined)return{pts:0,category:'none'};
  const pts_cfg=tippingPoints?.group?(isKO?tippingPoints.ko:tippingPoints.group):tippingPoints;
  const exact=tipH===actualH&&tipA===actualA;
  if(exact)return{pts:pts_cfg?.exactResult??5,category:'exact'};
  const tipDiff=tipH-tipA, actualDiff=actualH-actualA;
  if(tipDiff===actualDiff)return{pts:pts_cfg?.correctDiff??3,category:'diff'};
  if(Math.sign(tipDiff)===Math.sign(actualDiff))return{pts:pts_cfg?.correctTrend??2,category:'trend'};
  return{pts:0,category:'none'};
}
